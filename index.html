<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALL YOU CAN PUT!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>">
    
    
    <style>
        /* ==========================================================================
           1. CORE CSS ARCHITECTURE (GLOBAL VARIABLES & THEME ENGINE)
           ========================================================================== */
        :root {
            /* 商業級高對比色彩庫 */
            --pink: #ff3377;
            --blue: #00e5ff;
            --yellow: #ffea00;
            --purple: #d500f9;
            --orange: #ff6d00;
            --green: #00ff66;
            --danger: #ff1744;
            
            /* 介面與陰影 */
            --panel-bg: rgba(22, 27, 49, 0.88);
            --modal-bg: #1c2136;
            --grid-dark: #121626;
            --grid-empty: #1d223a;
            
            /* 預設海洋主題漸變 */
            --bg-gradient: linear-gradient(135deg, #ff99ca 0%, #4facfe 50%, #171b36 100%);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ==========================================================================
           2. UI LAYOUT & MENUS (LOBBY ARCHITECTURE)
           ========================================================================== */
        #menu-screen {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 30px 20px;
            z-index: 10;
            animation: appStartContainer 0.5s ease-out;
        }

        .lobby-header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 10px;
            padding: 10px;
        }

        .logo-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ffffff, var(--blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            filter: drop-shadow(3px 5px 12px rgba(0,0,0,0.4));
        }

        .lobby-settings-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
        }

        .lobby-settings-btn:hover {
            background: var(--blue);
            transform: translateY(-50%) scale(1.08) rotate(45deg);
            border-color: #fff;
            box-shadow: 0 0 15px var(--blue);
        }



        .mode-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .mode-card {
            background: var(--panel-bg);
            border-radius: 32px;
            padding: 35px 25px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.08);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .mode-card:hover {
            transform: translateY(-10px);
            border-color: var(--blue);
            box-shadow: 0 30px 60px rgba(0,242,254,0.2);
        }

        .mode-card h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .mode-card p {
            color: #bbc6e0;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: center;
            height: 75px;
        }

        .play-btn {
            background: linear-gradient(45deg, var(--pink), var(--blue));
            color: #fff;
            border: none;
            padding: 14px 45px;
            font-weight: 800;
            border-radius: 16px;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 51, 119, 0.3);
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(0, 229, 255, 0.4);
        }

        .continue-btn {
            background: linear-gradient(45deg, var(--yellow), var(--orange));
            color: #000;
            margin: 0 auto 30px auto;
            display: none;
            font-weight: 900;
            letter-spacing: 1px;
            border: 2px solid #000;
            box-shadow: 0 10px 25px rgba(255, 234, 0, 0.4);
            animation: pulseGlowAnimation 1.6s infinite alternate;
        }

        /* 66關選擇面板樣式 */
        #level-select-panel {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 25px;
            width: 100%;
            max-height: 180px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #level-select-panel::-webkit-scrollbar {
            width: 6px;
        }

        #level-select-panel::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 3px;
        }

        .lvl-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .lvl-btn:hover {
            background: var(--pink);
            border-color: #fff;
            transform: scale(1.08);
            box-shadow: 0 0 12px var(--pink);
        }

        /* ==========================================
           3. GAME INTERFACE & CANVARENA LAYOUT
           ========================================== */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 850px;
            gap: 30px;
            padding: 15px;
            box-sizing: border-box;
            justify-content: center;
            align-items: flex-start;
        }

        .main-game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 460px;
        }

        .score-board-top {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 8px;
            box-sizing: border-box;
        }

        .left-nav-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .home-icon-btn, .settings-gear-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 1.4rem;
            width: 46px;
            height: 46px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .home-icon-btn:hover { background: var(--pink); transform: scale(1.06); border-color: #fff; }
        .settings-gear-btn:hover { background: var(--blue); transform: scale(1.06) rotate(45deg); border-color: #fff; }

        .score-left-box {
            display: flex;
            flex-direction: column;
        }

        .top-score-text {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-shadow: 2px 3px 6px rgba(0,0,0,0.3);
        }

        .top-best-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a223d;
            margin-top: 2px;
        }

        .status-indicators-bar {
            width: 100%;
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .indicator-tag {
            flex: 1;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.95rem;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        #lucky-progress-bar { display: none; color: var(--yellow); border-color: rgba(255, 234, 0, 0.25); }
        #clear-multiplier-tag { color: var(--green); border-color: rgba(0, 255, 102, 0.25); }

        .arena {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 18px;
            border-radius: 36px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.6s ease, box-shadow 0.6s ease;
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 24px;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            max-width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            background: var(--grid-dark);
            z-index: 1;
        }

        /* ==========================================
           4. 🔮 RIGHT SELECT PANEL (PIXEL PERFECT ADAPTATION)
           ========================================== */
        #custom-select-panel {
            display: none;
            flex-direction: column;
            background: var(--panel-bg);
            border-radius: 28px;
            padding: 18px;
            border: 2px solid var(--purple);
            max-height: 700px;
            overflow-y: auto;
            width: 240px;
            box-sizing: border-box;
            gap: 15px;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            align-items: center;
            animation: panelSlideIn 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #custom-select-panel::-webkit-scrollbar { width: 5px; }
        #custom-select-panel::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

        .select-item-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .select-item-card {
            background: #111422;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            width: 170px;
            height: 140px;
            transition: all 0.2s ease;
        }

        .select-item-card:hover {
            border-color: var(--purple);
            background: rgba(213, 0, 249, 0.12);
            transform: scale(1.04);
        }

        .select-item-name {
            font-size: 0.8rem;
            font-weight: 800;
            color: #9aa7c4;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ==========================================
           5. PREMIUM OVERLAY MODALS (ANTI-PENETRATION & HIGH Z-INDEX)
           ========================================== */
        .overlay-window {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 7, 15, 0.88);
            z-index: 999999; /* 絕對死鎖超高層級，防止事件穿透 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            background: #1c2136;
            padding: 35px 40px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 25px 55px rgba(0,0,0,0.6);
            max-width: 350px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            animation: modalPopIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-box h2 {
            margin-bottom: 18px;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .modal-box p {
            margin-bottom: 25px;
            font-size: 1.15rem;
            color: #a2aed4;
            font-weight: bold;
            line-height: 1.5;
        }

        .modal-btns {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-btn {
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .btn-retry { background: linear-gradient(45deg, var(--pink), var(--blue)); color: #fff; box-shadow: 0 6px 15px rgba(255,51,119,0.3); }
        .btn-menu { background: #2d3554; color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .btn-close { background: #475070; color: #fff; }
        
        .btn-retry:hover { box-shadow: 0 10px 20px rgba(0,229,255,0.4); }
        .btn-menu:hover { background: #384268; }

        /* 語言切換盒子 */
        .lang-toggle-box {
            margin: 5px 0 25px 0;
            background: rgba(0,0,0,0.2);
            padding: 14px 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .lang-label { font-size: 1rem; font-weight: 700; color: #a4b3dc; }
        .lang-btn-group { display: flex; gap: 10px; }
        
        .lang-sub-btn {
            background: #2a314e;
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .lang-sub-btn.active {
            background: var(--blue);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(0,229,255,0.5);
        }

        /* 幸運寶箱抖動動畫 */
        .chest-anim {
            font-size: 6rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: chestWobbleLoop 0.4s ease infinite alternate;
            cursor: pointer;
            filter: drop-shadow(0 8px 25px rgba(255,234,0,0.4));
            transition: transform 0.2s;
        }

        .chest-anim:hover {
            transform: scale(1.15);
        }

        /* ==========================================================================
           6. ADVANCED KEYFRAMES & ANIMATIONS
           ========================================================================== */
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.96); } 
            to { opacity: 1; transform: scale(1); } 
        }
        @keyframes appStartContainer { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes panelSlideIn { 
            from { opacity: 0; transform: translateX(40px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
        @keyframes modalPopIn { 
            from { opacity: 0; transform: scale(0.85) translateY(40px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
        @keyframes chestWobbleLoop { 
            from { transform: rotate(-8deg); } 
            to { transform: rotate(8deg); } 
        }
        @keyframes pulseGlowAnimation { 
            from { box-shadow: 0 0 10px var(--yellow); } 
            to { box-shadow: 0 0 35px var(--orange); transform: scale(1.03); } 
        }
        /* ==========================================================================
           3. SATISFYING FEEDBACK SYSTEM (震屏 / Combo / 飛字)
           ========================================================================== */
        @keyframes shakeGame {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5px, 3px); }
            20% { transform: translate(4px, -4px); }
            30% { transform: translate(-3px, 4px); }
            40% { transform: translate(3px, -2px); }
            50% { transform: translate(-2px, 3px); }
            60% { transform: translate(1px, -1px); }
            70% { transform: translate(-1px, 2px); }
            80% { transform: translate(0, -1px); }
            100% { transform: translate(0, 0); }
        }
        .screen-shake { animation: shakeGame 0.35s ease-out; }
        .screen-shake-heavy { animation: shakeGame 0.6s ease-out; }
        #combo-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
            display: flex; justify-content: center; align-items: center;
        }
        .combo-popup {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900; text-align: center;
            text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 4px 15px rgba(0,0,0,0.5);
            opacity: 0; transform: scale(0.3);
            animation: comboAppear 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .combo-popup-single {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900; text-align: center;
            text-shadow: 0 0 30px rgba(255,255,255,0.6), 0 4px 15px rgba(0,0,0,0.5);
            opacity: 0; transform: scale(0.3);
            animation: comboAppearSingle 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes comboAppear {
            0% { opacity: 0; transform: scale(0.3) rotate(-5deg); }
            20% { opacity: 1; transform: scale(1.3) rotate(3deg); }
            40% { opacity: 1; transform: scale(1.05) rotate(0deg); }
            70% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.8) translateY(-80px); }
        }
        @keyframes comboAppearSingle {
            0% { opacity: 0; transform: scale(0.3) rotate(-3deg); }
            25% { opacity: 1; transform: scale(1.15) rotate(2deg); }
            50% { opacity: 1; transform: scale(1) rotate(0deg); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .combo-label { font-size: clamp(1rem, 3vw, 1.8rem); font-weight: 700; letter-spacing: 4px; opacity: 0.9; margin-top: -10px; }
        .combo-color-gold { color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.9), 0 0 80px rgba(255,215,0,0.5); }
        .combo-color-pink { color: #ff3377; text-shadow: 0 0 40px rgba(255,51,119,0.9), 0 0 80px rgba(255,51,119,0.5); }
        .combo-color-cyan { color: #00e5ff; text-shadow: 0 0 40px rgba(0,229,255,0.9), 0 0 80px rgba(0,229,255,0.5); }
        .combo-color-white { color: #ffffff; text-shadow: 0 0 40px rgba(255,255,255,0.9), 0 0 80px rgba(255,255,255,0.5); }
        .score-flyout {
            position: absolute; pointer-events: none;
            font-weight: 900; font-size: 1.4rem;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255,215,0,0.8), 0 2px 8px rgba(0,0,0,0.5);
            z-index: 60;
            animation: flyUp 1s ease-out forwards;
        }
        .score-flyout-green { color: #00ff66; text-shadow: 0 0 15px rgba(0,255,102,0.8); }
        .score-flyout-purple { color: #d500f9; text-shadow: 0 0 15px rgba(213,0,249,0.8); }
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            25% { opacity: 1; transform: translateY(-20px) scale(1.4); }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }
        .sound-toggle-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 1.1rem;
            padding: 8px 16px; border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease;
            backdrop-filter: blur(5px); margin-top: 10px;
        }
        .sound-toggle-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        /* ==========================================================================
           4. WORLD-CLASS ANIMATIONS ENGINE (极致动效引擎)
           ========================================================================== */
           
        /* 标题呼吸流光 */
        @keyframes logoRainbow {
            0% { text-shadow: 0 0 20px #ff3377, 0 0 40px #ff3377; }
            20% { text-shadow: 0 0 20px #ffea00, 0 0 40px #ffea00; }
            40% { text-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff; }
            60% { text-shadow: 0 0 20px #00ff66, 0 0 40px #00ff66; }
            80% { text-shadow: 0 0 20px #d500f9, 0 0 40px #d500f9; }
            100% { text-shadow: 0 0 20px #ff3377, 0 0 40px #ff3377; }
        }
        .logo-title {
            animation: logoRainbow 3s ease-in-out infinite, logoFloat 2s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* 模式卡片入场：依次弹出 */
        .mode-card {
            opacity: 0;
            animation: cardEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .mode-card:nth-child(1) { animation-delay: 0.1s; }
        .mode-card:nth-child(2) { animation-delay: 0.25s; }
        .mode-card:nth-child(3) { animation-delay: 0.4s; }
        .mode-card:nth-child(4) { animation-delay: 0.55s; }
        .mode-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.3);
        }
        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 按钮按下弹跳 */
        .play-btn, .modal-btn {
            transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.12s ease;
        }
        .play-btn:active, .modal-btn:active {
            transform: scale(0.92);
        }

        /* Combo爆炸级特效 */
        .combo-popup {
            text-shadow: 0 0 60px rgba(255,215,0,0.9), 0 0 120px rgba(255,215,0,0.6), 0 0 200px rgba(255,215,0,0.3);
        }
        @keyframes comboAppear {
            0% { opacity: 0; transform: scale(0.1) rotate(-10deg); filter: blur(8px); }
            15% { opacity: 1; transform: scale(1.6) rotate(5deg); filter: blur(0); }
            30% { opacity: 1; transform: scale(1.1) rotate(-2deg); }
            50% { opacity: 1; transform: scale(1) rotate(0); }
            75% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.6) translateY(-120px); filter: blur(2px); }
        }
        .combo-label {
            font-size: clamp(1rem, 3vw, 1.8rem); font-weight: 700; letter-spacing: 4px;
            opacity: 0.9; margin-top: -10px;
        }
        
        /* 分数飞字终极炫酷 */
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0) scale(0.3) rotate(-5deg); filter: blur(3px); }
            15% { opacity: 1; transform: translateY(-10px) scale(1.6) rotate(3deg); filter: blur(0); }
            30% { opacity: 1; transform: translateY(-25px) scale(1.1) rotate(0); }
            60% { opacity: 1; transform: translateY(-50px) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(0.8); filter: blur(1px); }
        }

        /* 震屏加强 */
        @keyframes shakeGame {
            0% { transform: translate(0, 0); }
            5% { transform: translate(-8px, 5px); }
            10% { transform: translate(7px, -7px); }
            15% { transform: translate(-6px, 6px); }
            20% { transform: translate(5px, -4px); }
            30% { transform: translate(-4px, 4px); }
            40% { transform: translate(3px, -2px); }
            55% { transform: translate(-2px, 3px); }
            75% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }
        .screen-shake { animation: shakeGame 0.45s ease-out; }
        .screen-shake-heavy { animation: shakeGame 0.7s ease-out; }

        /* Game Over/胜利 弹窗 + 背景闪烁 */
        @keyframes gameOverBgPulse {
            0%, 100% { background: rgba(0,0,0,0.6); }
            50% { background: rgba(0,0,0,0.8); }
        }
        .game-over-modal {
            animation: gameOverBgPulse 1.5s ease-in-out infinite;
        }

        /* 宝箱狂野抖动 */
        @keyframes chestWobbleLoop {
            0% { transform: rotate(-12deg) scale(1); }
            25% { transform: rotate(8deg) scale(1.05); }
            50% { transform: rotate(-6deg) scale(1.1); }
            75% { transform: rotate(10deg) scale(1.05); }
            100% { transform: rotate(-12deg) scale(1); }
        }
        .chest-anim {
            animation: chestWobbleLoop 0.35s ease infinite alternate;
        }
        .chest-anim:hover {
            animation: chestWobbleLoop 0.15s ease infinite alternate;
        }
</head>

        // ----------------------------------------------------------------------
        // ----------------------------------------------------------------------
        // MODULE: VIBE — 進階震動反饋 (Haptics Engine)
        // ----------------------------------------------------------------------
        GameApp.Vibe = {
            // 硬件震动 + 音频触感双引擎
            _hw: !!(navigator.vibrate || navigator.webkitVibrate),
            _lastTs: 0,
            _throttle: 25,
            // 兼容检测
            _vibrate: function(pattern) {
                const p = Array.isArray(pattern) ? pattern : [pattern];
                try {
                    if (navigator.vibrate) navigator.vibrate(p);
                    else if (navigator.webkitVibrate) navigator.webkitVibrate(p);
                } catch(e) {}
            },
            // 音频触感：对于不支持硬件震动的设备，用低音脉冲模拟
            _audioThump: function(intensity) {
                try {
                    const ctx = GameApp.Audio.ctx || GameApp.Audio.init();
                    if (!ctx) return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(80 - intensity * 20, ctx.currentTime);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.08 + intensity * 0.06, ctx.currentTime + 0.005);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04 + intensity * 0.03);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.05 + intensity * 0.03);
                } catch(e) {}
            },
            // 节流调用
            _fire: function(pattern, intensity) {
                const now = Date.now();
                if (now - this._lastTs < this._throttle) return;
                this._lastTs = now;
                this._vibrate(pattern);
                this._audioThump(intensity || 0);
            },

            light: function() {
                this._fire(12, 0);
            },
            medium: function() {
                this._fire(25, 0.5);
            },
            heavy: function() {
                this._fire(45, 1);
            },
            celebration: function() {
                this._fire([55, 45, 55, 45, 90, 70, 120], 1);
                this._lastTs = 0;
            },
            triple: function() {
                this._fire([25, 18, 25, 18, 35], 0.7);
            },
            combo: function(count) {
                if (count <= 0) return;
                const pattern = [];
                for (let i = 0; i < Math.min(count, 4); i++) {
                    pattern.push(25, 18);
                }
                pattern.push(60);
                this._fire(pattern, 0.8);
                this._lastTs = 0;
            }
        };


        // MODULE: USER INTERFACE (UI) & MODALS

        // MODULE: AUDIO — Web Audio API 合成音效 (無需音頻文件)
        // ----------------------------------------------------------------------
        GameApp.Audio = {
            ctx: null,
            enabled: true,
            masterVolume: 0.3,

            _ensure: function() {
                if (this.ctx) return true;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    return true;
                } catch(e) { return false; }
            },

            toggle: function() {
                this.enabled = !this.enabled;
                const btn = document.getElementById('soundToggleBtn');
                if (btn) btn.innerText = this.enabled ? '🔊 音效 ON' : '🔇 音效 OFF';
                if (this.enabled) { this._ensure(); this.ctx && this.ctx.resume(); }
            },

            _play: function(freq, duration, type, vol) {
                if (!this.enabled || !this._ensure()) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime((vol || 0.3) * this.masterVolume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);

                s.particles = []; s.clearingCells = [];

            simulateLineClear: function(shape, targetR, targetC) {
                const s = GameApp.State;
                const size = GameApp.Config.bGridSize;
                let tempGrid = s.bGrid.map(row => [...row]);
                
                // 假裝放進去
                for(let r=0; r<shape.length; r++) {
                    for(let c=0; c<shape[r].length; c++) {
                        if(shape[r][c]) tempGrid[targetR+r][targetC+c] = 1;
                    }
                }

                // 檢查是否達成整行或整列
                for(let r=0; r<size; r++) {
                    if(tempGrid[r].every(cell => cell !== 0 && cell !== '#4e566d')) return true;
                }
                for(let c=0; c<size; c++) {
                    let m = true;
                    for(let r=0; r<size; r++) {
                        if(tempGrid[r][c] === 0 || tempGrid[r][c] === '#4e566d') m = false;
                    }
                    if(m) return true;
                }
                return false;
            },


            generateHand: function() {
                const s = GameApp.State;
                s.hand = [];
                const size = GameApp.Config.bGridSize;
                const E = GameApp.Config.Shapes.easy;
                const S = GameApp.Config.Shapes.special;
                const M = GameApp.Config.Shapes.medium;
                const H = GameApp.Config.Shapes.hard;
                // 难度曲线：根据当前分数决定出牌池
                //   Phase 1 (0-200):  新手保护，基本只出简单形状
                //   Phase 2 (200-500): 少量中等形状
                //   Phase 3 (500-1000): 混合出牌
                //   Phase 4 (1000-2000): 开始出难形状
                //   Phase 5 (2000+):   真正的挑战
                let poolEasy = [...E];
                let poolMed = [...E, ...M];
                let poolAll = [...E, ...M, ...H];

                let chosenPool;
                let difficultyTier;

                if (s.currentMode === 'level') {
                    if (s.currentLevel <= 10) { chosenPool = poolEasy; difficultyTier = 0; }
                    else if (s.currentLevel <= 25) { chosenPool = poolMed; difficultyTier = 1; }
                    else if (s.currentLevel <= 45) { chosenPool = poolAll; difficultyTier = 2; }
                    else { chosenPool = [...M, ...H]; difficultyTier = 3; }
                } else {
                    const sc = s.bScore;
                    if (sc <= 200) { chosenPool = poolEasy; difficultyTier = 0; }
                    else if (sc <= 500) { 
                        chosenPool = Math.random() < 0.7 ? poolEasy : poolMed;
                        difficultyTier = 1;
                    } else if (sc <= 1000) {
                        const r = Math.random();
                        chosenPool = r < 0.4 ? poolEasy : r < 0.8 ? poolMed : poolAll;
                        difficultyTier = 2;
                    } else if (sc <= 2000) {
                        const r = Math.random();
                        chosenPool = r < 0.2 ? poolEasy : r < 0.6 ? poolMed : poolAll;
                        difficultyTier = 3;
                    } else {
                        chosenPool = Math.random() < 0.3 ? poolMed : [...M, ...H];
                        difficultyTier = 4;
                    }
                }

                // 🎯 优先找一个能立即消除行列的形狀（所有难度都尝试，低分时更积极）  
                let lineClearPiece = null;
                if (s.currentMode === 'endless' || s.currentMode === 'lucky') {
                    let searchPool = (difficultyTier <= 1 || s.bScore <= 100) ? [...E, ...M, ...S] : [...E, ...M, ...H];
                    searchPool.sort(() => Math.random() - 0.5);
                    for (let p of searchPool) {
                        for (let r = 0; r < size; r++) {
                            for (let c = 0; c < size; c++) {
                                if (this.canPlaceShape(p.matrix, r, c) && this.simulateLineClear(p.matrix, r, c)) {
                                    lineClearPiece = p;
                                    break;
                                }
                            }
                            if (lineClearPiece) break;
                        }
                        if (lineClearPiece) break;
                    }
                }
                // 如果没找到能消行的，尝试找一个能放得下的形状（确保至少能放）
                let anyFitPiece = null;
                if (!lineClearPiece) {
                    let fallbackPool = [...E, ...S];
                    fallbackPool.sort(() => Math.random() - 0.5);
                    for (let p of fallbackPool) {
                        for (let r = 0; r < size; r++) {
                            for (let c = 0; c < size; c++) {
                                if (this.canPlaceShape(p.matrix, r, c)) {
                                    anyFitPiece = p;
                                    break;
                                }
                            }
                            if (anyFitPiece) break;
                        }
                        if (anyFitPiece) break;
                    }
                }

                // 发牌：3 张手牌
                for (let i = 0; i < 3; i++) {
                    let piece;
                    if (i === 0 && lineClearPiece) {
                        piece = lineClearPiece;
                    } else if (i === 0 && anyFitPiece) {
                        piece = anyFitPiece;
                    } else {
                        let pool = chosenPool;
                        piece = pool[Math.floor(Math.random() * pool.length)];
                    }
                    s.hand.push({
                        shape: piece.matrix,
                        color: piece.color,
                        x: 35 + i * 140,
                        y: 520,
                        origX: 35 + i * 140,
                        origY: 520,
                        isUsed: false
                    });
                }

                // 🎯 精准帮扶：根据棋盘空缺给玩家需要的形状
                this._giveHelpfulPieces(chosenPool);
                // 保底机制：如果所有手牌都无法放置，自动替换为可放置的简单形状
                this._ensurePlayableHand();

                this.saveCurrentGame();
            },

            // 🎯 精准帮扶：扫描棋盘找出差1格就能消的行列，给玩家需要的形状
            _giveHelpfulPieces: function(pool) {
                const s = GameApp.State;
                const size = GameApp.Config.bGridSize;
                const E = GameApp.Config.Shapes.easy;
                const S = GameApp.Config.Shapes.special;

                // 收集所有差1格的行和列信息
                let neededShapes = [];

                // 检查行：找出哪些行只差1格
                for (let r = 0; r < size; r++) {
                    let emptyCol = -1;
                    let filled = 0;
                    for (let c = 0; c < size; c++) {
                        if (s.bGrid[r][c] === 0) {
                            if (emptyCol === -1) emptyCol = c;
                            else { emptyCol = -2; break; }
                        } else if (s.bGrid[r][c] !== '#4e566d') {
                            filled++;
                        }
                    }
                    if (emptyCol >= 0 && filled >= size - 2) {
                        let dot = S.find(p => p.name === 'dot') || { matrix: [[1]], color: '#00ff66' };
                        neededShapes.push({ shape: dot.matrix, color: dot.color, priority: 10 });
                    }
                }

                // 检查列：同样逻辑
                for (let c = 0; c < size; c++) {
                    let emptyRow = -1;
                    let filled = 0;
                    for (let r = 0; r < size; r++) {
                        if (s.bGrid[r][c] === 0) {
                            if (emptyRow === -1) emptyRow = r;
                            else { emptyRow = -2; break; }
                        } else if (s.bGrid[r][c] !== '#4e566d') {
                            filled++;
                        }
                    }
                    if (emptyRow >= 0 && filled >= size - 2) {
                        let dot = S.find(p => p.name === 'dot') || { matrix: [[1]], color: '#00ff66' };
                        neededShapes.push({ shape: dot.matrix, color: dot.color, priority: 10 });
                    }
                }

                // 检查差2格的行（需要横条）
                for (let r = 0; r < size; r++) {
                    let emptyCols = [];
                    for (let c = 0; c < size; c++) {
                        if (s.bGrid[r][c] === 0) emptyCols.push(c);
                    }
                    if (emptyCols.length === 2) {
                        let bar2 = E.find(p => p.name === 'bar-2') || { matrix: [[1,1]], color: '#ffea00' };
                        neededShapes.push({ shape: bar2.matrix, color: bar2.color, priority: 8 });
                    } else if (emptyCols.length === 3) {
                        let bar3 = E.find(p => p.name === 'bar-3') || { matrix: [[1,1,1]], color: '#00e5ff' };
                        neededShapes.push({ shape: bar3.matrix, color: bar3.color, priority: 6 });
                    } else if (emptyCols.length === 4) {
                        let bar4 = E.find(p => p.name === 'bar-4') || { matrix: [[1,1,1,1]], color: '#ff6d00' };
                        neededShapes.push({ shape: bar4.matrix, color: bar4.color, priority: 4 });
                    }
                }

                // 检查差2格的列（需要竖条）
                for (let c = 0; c < size; c++) {
                    let emptyRows = [];
                    for (let r = 0; r < size; r++) {
                        if (s.bGrid[r][c] === 0) emptyRows.push(r);
                    }
                    if (emptyRows.length === 2) {
                        neededShapes.push({ shape: [[1],[1]], color: '#ffea00', priority: 7 });
                    } else if (emptyRows.length === 3) {
                        let v3 = E.find(p => p.name === 'vbar-3') || { matrix: [[1],[1],[1]], color: '#00e5ff' };
                        neededShapes.push({ shape: v3.matrix, color: v3.color, priority: 5 });
                    } else if (emptyRows.length === 4) {
                        let v4 = E.find(p => p.name === 'vbar-4') || { matrix: [[1],[1],[1],[1]], color: '#ff6d00' };
                        neededShapes.push({ shape: v4.matrix, color: v4.color, priority: 3 });
                    }
                }

                // 如果有需要的形状，替换手牌中第一和第二个未使用的（最多2个）
                if (neededShapes.length > 0) {
                    neededShapes.sort((a, b) => b.priority - a.priority);
                    const picks = neededShapes.slice(0, Math.min(neededShapes.length, 2));
                    let replaceIdx = 0;
                    for (let i = 0; i < s.hand.length && replaceIdx < picks.length; i++) {
                        if (!s.hand[i].isUsed) {
                            s.hand[i].shape = picks[replaceIdx].shape;
                            s.hand[i].color = picks[replaceIdx].color;
                            replaceIdx++;
                        }
                    }
                }
            },

            // 保底：逐一检查每张手牌，确保都能放置；不能放的就替换成简单形状
            _ensurePlayableHand: function() {
                const s = GameApp.State;
                const size = GameApp.Config.bGridSize;
                const E = GameApp.Config.Shapes.easy;
                const S = GameApp.Config.Shapes.special;
                const pool = [...E, ...S];

                for (let i = 0; i < s.hand.length; i++) {
                    if (s.hand[i].isUsed) continue;
                    let playable = false;
                    for (let r = 0; r < size; r++) {
                        for (let c = 0; c < size; c++) {
                            if (this.canPlaceShape(s.hand[i].shape, r, c)) {
                                playable = true;
                                break;
                            }
                        }
                        if (playable) break;
                    }
                    if (!playable) {
                        // 暴力替换到有能放的为止
                        for (let attempts = 0; attempts < 50; attempts++) {
                            let testPiece = pool[Math.floor(Math.random() * pool.length)];
                            for (let r = 0; r < size; r++) {
                                for (let c = 0; c < size; c++) {
                                    if (this.canPlaceShape(testPiece.matrix, r, c)) {
                                        s.hand[i].shape = testPiece.matrix;
                                        s.hand[i].color = testPiece.color;
                                        playable = true;
                                        break;
                                    }
                                }
                                if (playable) break;
                            }
                            if (playable) break;
                        }
                    }
                }
            },

            triggerHapticShock: function(duration) {
                if (navigator.vibrate) {
                    try { navigator.vibrate(duration); } catch(e) {}
                }
            },

            checkAndApplyDynamicTheme: function() {
                const body = document.body;
                const arenaPanel = document.getElementById('gameArenaPanel');
                const s = GameApp.State;
                const t = GameApp.Config.Themes;
                
                if (s.bScore >= 1000) s.currentTheme = t.universe;
                else if (s.bScore >= 600) s.currentTheme = t.sunset;
                else if (s.bScore >= 300) s.currentTheme = t.grass;
                else s.currentTheme = t.sea;

                body.style.background = s.currentTheme.bg;
                arenaPanel.style.background = s.currentTheme.panel;
            },

            getSnapCoordinates: function() {
                const s = GameApp.State; const cellSize = GameApp.Config.bCellSize;
                const targetX = s.mouseX - s.dragOffset.x; const targetY = s.mouseY - s.dragOffset.y - 50; 
                return { gridX: Math.round(targetX / cellSize), gridY: Math.round(targetY / cellSize) };
            },

            canPlaceShape: function(shape, targetR, targetC) {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                for(let r=0; r<shape.length; r++) {
                    for(let c=0; c<shape[r].length; c++) {
                        if(shape[r][c]) {
                            let nr = targetR + r; let nc = targetC + c;
                            if(nr < 0 || nr >= size || nc < 0 || nc >= size || s.bGrid[nr][nc] !== 0) return false;
                        }
                    }
                }
                return true;
            },

            placeShape: function(shape, targetR, targetC, color, scoreGain) {
                const s = GameApp.State;
                for(let r=0; r<shape.length; r++) {
                    for(let c=0; c<shape[r].length; c++) {
                        if(shape[r][c]) s.bGrid[targetR+r][targetC+c] = color;
                    }
                }
                s.bScore += Math.round(scoreGain * s.currentMultiplier);
                GameApp.UI.updateScoreDisplay(); this.checkAndApplyDynamicTheme();
            },

            checkAllClearCondition: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                let isBoardEmpty = true;
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        if(s.bGrid[r][c] !== 0 && s.bGrid[r][c] !== '#4e566d') { isBoardEmpty = false; break; }
                    }
                    if(!isBoardEmpty) break;
                }
                if (isBoardEmpty) {
                    s.allClearCount++;
                    if (s.allClearCount === 1) s.currentMultiplier = 1.2;
                    else if (s.allClearCount === 2) s.currentMultiplier = 1.4;
                    else if (s.allClearCount === 3) s.currentMultiplier = 1.6;
                    else s.currentMultiplier = 2.0; 
                    
                    this.triggerHapticShock(80);
                    GameApp.Vibe.celebration();
                    GameApp.Audio.allClear();
                    s.allClearFlashTimer = 1.0;
                    s.screenShakeTimer = 0.8;
                    s.shakeIntensity = 2;
                    GameApp.Core.showComboPopup(0);
                    const cx = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    const cy = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    s.scoreFlyouts.push({ x: cx, y: cy, vy: 2.2, text: "\u2728 ALL CLEAR x" + s.allClearCount + "!", color: "#ffd700", timer: 1.2 });
                    GameApp.UI.updateScoreDisplay();
                }
            },

            checkLineClears: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                let rows = []; let cols = [];
                
                for(let r=0; r<size; r++) if(s.bGrid[r].every(cell => cell !== 0 && cell !== '#4e566d')) rows.push(r);
                for(let c=0; c<size; c++) {
                    let m = true;
                    for(let r=0; r<size; r++) if(s.bGrid[r][c] === 0 || s.bGrid[r][c] === '#4e566d') m = false;
                    if(m) cols.push(c);
                }
                
                let linesCount = rows.length + cols.length;
                
                if (s.currentMode === 'lucky' && linesCount > 0) {
                    s.luckyLinesNeeded -= linesCount;
                    if (s.luckyLinesNeeded <= 0) {
                        s.luckyLinesNeeded = GameApp.Config.luckyLineTarget;
                        setTimeout(this.triggerChestPopup.bind(this), 500); 
                    }
                }

                if (linesCount > 0) {
                    GameApp.Vibe.heavy();
                    GameApp.Audio.multiClear(linesCount);
                    this.triggerHapticShock(35 * linesCount);
                    GameApp.Core.showComboPopup(linesCount);
                    s.screenShakeTimer = 0.3 + linesCount * 0.05;
                    s.shakeIntensity = linesCount >= 3 ? 2 : 1;
                    const cx = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    const cy = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    const bonus = Math.round(linesCount * 120 * s.currentMultiplier);
                    s.scoreFlyouts.push({ x: cx, y: cy + 20, vy: 1.8, text: "+" + bonus, color: linesCount >= 4 ? "#d500f9" : linesCount >= 3 ? "#ffd700" : "#00e5ff", timer: 1 });
                }

                const bCell = GameApp.Config.bCellSize;
                // 超级粒子爆炸
                const burstCount = Math.min(linesCount * 8, 40);
                for (let i = 0; i < burstCount; i++) {
                    setTimeout(() => {
                        const rx = Math.random() * 8 * bCell;
                        const ry = Math.random() * 8 * bCell;
                        if (i % 3 === 0) {
                            s.particles.push({ x: rx, y: ry, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.8) * 15, radius: Math.random() * 5 + 2, alpha: 1, color: '#ffd700' });
                        } else if (i % 3 === 1) {
                            s.particles.push({ x: rx, y: ry, vx: (Math.random() - 0.5) * 16, vy: (Math.random() - 0.8) * 12, radius: Math.random() * 4 + 2, alpha: 1, color: '#00e5ff' });
                        } else {
                            s.particles.push({ x: rx, y: ry, vx: (Math.random() - 0.5) * 18, vy: (Math.random() - 0.8) * 14, radius: Math.random() * 4 + 2, alpha: 1, color: '#ff3377' });
                        }
                    }, i * 20);
                }
                rows.forEach((r, rIndex) => {
                    setTimeout(() => {
                        for(let c=0; c<size; c++) {
                            s.clearingCells.push({ r: r, c: c, color: s.bGrid[r][c], scale: 0.3, expanding: true });
                            this.generateParticles(c * bCell + bCell/2, r * bCell + bCell/2, s.bGrid[r][c]);
                        }
                    }, rIndex * 80);
                });

                cols.forEach((c, cIndex) => {
                    setTimeout(() => {
                        for(let r=0; r<size; r++) {
                            if(!s.clearingCells.some(cell => cell.r === r && cell.c === c)) {
                                s.clearingCells.push({ r: r, c: c, color: s.bGrid[r][c], scale: 0.3, expanding: true });
                                this.generateParticles(c * bCell + bCell/2, r * bCell + bCell/2, s.bGrid[r][c]);
                            }
                        }
                    }, cIndex * 80);
                });

                rows.forEach(r => s.bGrid[r].fill(0));
                cols.forEach(c => { for(let r=0; r<size; r++) s.bGrid[r][c] = 0; });
                
                if(linesCount > 0) {
                    s.bScore += Math.round(linesCount * 120 * s.currentMultiplier);
                    GameApp.UI.updateScoreDisplay();
                }
            },

            generateParticles: function(x, y, color) {
                const s = GameApp.State;
                for(let i=0; i<20; i++) {
                    s.particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.8) * 12, radius: Math.random() * 4.5 + 1.5, alpha: 1, color: color });
                }
            },

            checkGameOver: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                let remains = s.hand.filter(p => !p.isUsed);
                if(remains.length === 0) return false;
                for(let piece of remains) {
                    for(let r=0; r<size; r++) {
                        for(let c=0; c<size; c++) {
                            if(this.canPlaceShape(piece.shape, r, c)) return false; 
                        }
                    }
                }
                return true; 
            },

            getEventPos: function(e) {
                const canvas = GameApp.UI.elements.canvas;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                // 缩放到 Canvas 内部坐标系（解决手机触摸坐标偏移）
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            },

            isInteractionBlocked: function() {
                const ui = GameApp.UI.elements; const s = GameApp.State;
                return (s.isGameOver || ui.settingsOverlay.style.display === 'flex' || ui.luckyChestOverlay.style.display === 'flex' || s.isCustomSelecting);
            },

            bindEvents: function() {
                const canvas = GameApp.UI.elements.canvas;
                
                canvas.addEventListener('mousedown', (e) => {
                    if (this.isInteractionBlocked()) return;
                    this.handleInputStart(this.getEventPos(e));
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    if (this.isInteractionBlocked()) return;
                    this.handleInputMove(this.getEventPos(e));
                });
                
                window.addEventListener('mouseup', () => {
                    if (this.isInteractionBlocked() && !GameApp.State.selectedPiece) return;
                    this.handleInputEnd();
                });

                canvas.addEventListener('touchstart', (e) => {
                    if (this.isInteractionBlocked()) return; e.preventDefault();
                    this.handleInputStart(this.getEventPos(e));
                }, { passive: false });
                
                canvas.addEventListener('touchmove', (e) => {
                    if (this.isInteractionBlocked()) return; e.preventDefault();
                    this.handleInputMove(this.getEventPos(e));
                }, { passive: false });
                
                window.addEventListener('touchend', () => {
                    if (this.isInteractionBlocked() && !GameApp.State.selectedPiece) return;
                    this.handleInputEnd();
                });
            },

            handleInputStart: function(pos) {
                const s = GameApp.State; const bCell = GameApp.Config.bCellSize;
                s.mouseX = pos.x; s.mouseY = pos.y;
                s.lastHoverR = -1; s.lastHoverC = -1;
                
                s.hand.forEach(piece => {
                    if(piece.isUsed) return;
                    if(s.mouseX >= piece.x - 35 && s.mouseX <= piece.x + 155 && s.mouseY >= piece.y - 30 && s.mouseY <= piece.y + 150) {
                        s.selectedPiece = piece;
                        s.dragOffset.x = (piece.shape[0].length * bCell) / 2;
                        s.dragOffset.y = (piece.shape.length * bCell) / 2;
                    }
                });
            },

            handleInputMove: function(pos) {
                const s = GameApp.State;
                s.mouseX = pos.x; s.mouseY = pos.y;
                
                if (s.selectedPiece && !s.isGameOver) {
                    // 每帧都震，配合节流自动控制频率，手指划过屏幕有连续沙沙感
                    GameApp.Vibe.light();
                    // 格子吸附震动（进新格子加额外反馈）
                    const bCell = GameApp.Config.bCellSize;
                    const hoverR = Math.floor(pos.y / bCell);
                    const hoverC = Math.floor(pos.x / bCell);
                    if ((hoverR !== s.lastHoverR || hoverC !== s.lastHoverC) && hoverR >= 0 && hoverR < 8 && hoverC >= 0 && hoverC < 8) {
                        s.lastHoverR = hoverR;
                        s.lastHoverC = hoverC;
                        GameApp.Vibe.medium();
                    }
                } else {
                    s.lastHoverR = -1;
                    s.lastHoverC = -1;
                }
            },

            handleInputEnd: function() {
                const s = GameApp.State;
                s.lastHoverR = -1; s.lastHoverC = -1;
                if (!s.selectedPiece) return;
                
                const { gridX, gridY } = this.getSnapCoordinates();
                
                if(this.canPlaceShape(s.selectedPiece.shape, gridY, gridX)) {
                    // 基础分 = 方块格数 × (10 + 格数×2)，大块高分小块低分
                    let cells = 0;
                    s.selectedPiece.shape.forEach(row => row.forEach(v => { if(v) cells++; }));
                    let baseGain = cells * (10 + cells * 2); let finalGain = Math.round(baseGain * s.currentMultiplier);
                    this.placeShape(s.selectedPiece.shape, gridY, gridX, s.selectedPiece.color, finalGain);
                    // 放置分数飞字
                    const fcx = gridX * bCell + (s.selectedPiece.shape[0].length * bCell) / 2;
                    const fcy = gridY * bCell - 10;
                    const fcolor = cells >= 4 ? '#d500f9' : cells >= 3 ? '#00e5ff' : '#00ff66';
                    s.scoreFlyouts.push({ x: fcx, y: fcy, vy: 1.5, text: '+' + finalGain, color: fcolor, timer: 1.2 });
                    GameApp.Render.triggerSoftJelly(gridY, gridX, s.selectedPiece.shape);
                    GameApp.Vibe.medium();
                    GameApp.Audio.place();
                    s.selectedPiece.isUsed = true;
                    this.triggerHapticShock(20); 
                    

                    this.checkLineClears(); this.checkAllClearCondition();
                    if(s.hand.every(p => p.isUsed)) this.generateHand();
                    
                    if (s.currentMode === 'endless' || s.currentMode === 'lucky') {
                        if (s.bScore > s.bBestScore) { s.bBestScore = s.bScore; this.saveBestScore(); GameApp.UI.elements.topBestText.innerText = `${GameApp.I18N.getText('best')}: ${s.bBestScore}`; }
                        this.saveCurrentGame();
                    }
                    if (s.currentMode === 'level' && s.bScore >= s.targetScore) GameApp.UI.showGameOverModal(true);
                    else if(this.checkGameOver()) GameApp.UI.showGameOverModal(false);
                }
                s.selectedPiece = null; 
            },
            // 🔮 寶箱與自選 3 連抽系統 (PICK 3 SYSTEM)
            triggerChestPopup: function() {
                const s = GameApp.State;
                s.selectedPiece = null; 
                GameApp.UI.elements.luckyChestOverlay.style.display = 'flex';
            },

            drawLuckyChest: function() {

                GameApp.UI.elements.luckyChestOverlay.style.display = "none";
                const s = GameApp.State; const t = GameApp.I18N;
                let rng = Math.random();
                
                // 🎲 7 種寶箱獎勵
                const prizes = [
                    { chance: 0.05, name: 'jackpot', exec: function() {
                        s.bScore = Math.floor(s.bScore * 2);
                        GameApp.Core.showComboPopup(5);
                        alert('💎 頭獎！分數直接翻倍！目前: ' + s.bScore);

                        s.hand = [];
                        for(let i=0; i<3; i++) s.hand.push({ shape: [[1]], color: '#00ff66', x: 35 + i * 140, y: 520, origX: 35 + i * 140, origY: 520, isUsed: false });
                        alert('🎯 幸運單點！下回合全部變為 1x1 靈活小點！');

                        // 炸彈：清空棋盤中央 3x3 區域
                        const size = GameApp.Config.bGridSize;
                        const center = Math.floor(size / 2);
                        let cleared = 0;
                        for (let r = center-1; r <= center+1; r++) {
                            for (let c = center-1; c <= center+1; c++) {
                                if (r >= 0 && r < size && c >= 0 && c < size && s.bGrid[r][c] !== 0 && s.bGrid[r][c] !== '#4e566d') {
                                    s.bGrid[r][c] = 0;
                                    cleared++;
                                }
                            }
                        }
                        // 粒子效果
                        const bCell = GameApp.Config.bCellSize;
                        for (let r = center-1; r <= center+1; r++) {
                            for (let c = center-1; c <= center+1; c++) {
                                GameApp.Core.generateParticles(c * bCell + bCell/2, r * bCell + bCell/2, '#ff6d00');
                            }
                        }
                        GameApp.Vibe.celebration();
                        s.screenShakeTimer = 0.5;
                        alert('💥 炸彈！清空棋盤中央 3x3 區域！（清除 ' + cleared + ' 格）');
                    }},
                    { chance: 0.20, name: 'bonus', exec: function() {
                        const bonus = 100 + Math.floor(Math.random() * 401); // 100~500
                        s.bScore += bonus;
                        const cx = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                        const cy = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                        s.scoreFlyouts.push({ x: cx, y: cy, vy: 2.5, text: '💰 +' + bonus, color: '#ffd700', timer: 1.5 });
                        alert('💰 金幣寶箱！獲得 ' + bonus + ' 額外加分！');
                    }},
                    { chance: 0.20, name: 'rowclear', exec: function() {
                        const size = GameApp.Config.bGridSize;
                        const bCell = GameApp.Config.bCellSize;
                        // 找填最满的行来清除
                        let bestRow = -1;
                        let mostFilled = 0;
                        for (let r = 0; r < size; r++) {
                            let filled = 0;
                            for (let c = 0; c < size; c++) {
                                if (s.bGrid[r][c] !== 0 && s.bGrid[r][c] !== '#4e566d') filled++;
                            }
                            if (filled > mostFilled) { mostFilled = filled; bestRow = r; }
                        }
                        if (bestRow >= 0) {
                            for (let c = 0; c < size; c++) {
                                if (s.bGrid[bestRow][c] !== '#4e566d') {
                                    s.bGrid[bestRow][c] = 0;
                                    GameApp.Core.generateParticles(c * bCell + bCell/2, bestRow * bCell + bCell/2, '#ff6d00');
                                }
                            }
                            GameApp.Vibe.celebration();
                            s.screenShakeTimer = 0.5;
                            s.bScore += Math.round(50 * s.currentMultiplier);
                            GameApp.Core.showComboPopup(5);
                            alert('🧹 掃行！清除最滿的一行（第 ' + (bestRow+1) + ' 行）！');
                        } else {
                            alert('🤷 棋盤已空，送你 100 分！');
                            s.bScore += 100;
                        }
                    }},
                    { chance: 0.15, name: 'wildswap', exec: function() {
                        // 換牌：獲得一組高級形狀
                        const pool = [...GameApp.Config.Shapes.medium, ...GameApp.Config.Shapes.hard, ...GameApp.Config.Shapes.hard];
                        s.hand = [];
                        for (let i = 0; i < 3; i++) {
                            const pick = pool[Math.floor(Math.random() * pool.length)];
                            s.hand.push({ shape: pick.matrix, color: pick.color, x: 35 + i * 140, y: 520, origX: 35 + i * 140, origY: 520, isUsed: false });
                        }
                        alert('🔄 乾坤大挪移！獲得一組高級方塊！');
                    }},
                    { chance: 0.10, name: 'select', exec: function() {
                        s.isCustomSelecting = true;
                        s.hand = [];
                        s.customPicksLeft = 3;
                        document.querySelectorAll('.select-item-card').forEach(el => {
                            el.style.opacity = '1';
                            el.style.pointerEvents = 'auto';
                            el.style.filter = 'grayscale(0%)';
                        });
                        GameApp.UI.elements.customSelectPanel.style.display = 'flex';
                        alert('🔮 靈魂自選！請挑選 3 個你最想要的形狀！');
                    }}
                ];
                
                // 按機率抽選
                let r = Math.random();
                let cumulative = 0;
                for (let prize of prizes) {
                    cumulative += prize.chance;
                    if (r < cumulative) {
                        prize.exec();
                        break;
                    }
                }
                
                GameApp.UI.updateScoreDisplay(); this.saveCurrentGame();
            },

                    for (let i = 0; i < 50; i++) {
