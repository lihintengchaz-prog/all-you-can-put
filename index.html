                        }, i * 15);
                    }
                    GameApp.Audio.allClear();
                    GameApp.Vibe.celebration();
                } else if (linesCount === 0) {
                    const tier = s.allClearCount >= 4 ? '💎 PERFECT!' : s.allClearCount >= 3 ? '🌈 LEGENDARY!' : s.allClearCount >= 2 ? '✨ AMAZING!' : '🌟 ALL CLEAR!';
                    const color = s.allClearCount >= 4 ? 'combo-color-gold' : s.allClearCount >= 3 ? 'combo-color-pink' : s.allClearCount >= 2 ? 'combo-color-cyan' : 'combo-color-gold';
                    overlay.innerHTML = '<div class="combo-popup ' + color + '" style="font-size:clamp(3rem,10vw,6rem);">' + tier + '<br><span class="combo-label">⚡ ' + s.currentMultiplier.toFixed(1) + 'x MULTIPLIER ⚡</span></div>';
                    // 全清粒子爆花
                    for (let i = 0; i < 30; i++) {
                        setTimeout(() => {
                            s.particles.push({ x: Math.random() * 440, y: Math.random() * 440, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.8) * 16, radius: Math.random() * 5 + 2, alpha: 1, color: ['#ffd700','#ff3377','#00e5ff'][Math.floor(Math.random()*3)] });
                        }, i * 20);
                    }
                    GameApp.Vibe.combo(s.allClearCount);
                } else if (linesCount >= 4) {
                    overlay.innerHTML = '<div class="combo-popup combo-color-gold" style="font-size:clamp(3rem,10vw,6rem);">🔥 ' + linesCount + 'x SUPER CLEAR! 🔥<br><span class="combo-label">MASSIVE COMBO</span></div>';
                    GameApp.Audio.combo(linesCount);
                    GameApp.Vibe.combo(linesCount);
                } else {
                    overlay.innerHTML = '<div class="combo-popup-single combo-color-cyan">CLEAR!</div>';
                    GameApp.Vibe.light();
                }
                setTimeout(function() { overlay.innerHTML = ''; s.comboDisplay = null; }, 1300);
            },

            selectThisCustomShape: function(item, uiElement) {
                const s = GameApp.State;
                if (!s.isCustomSelecting) return;
                
                // 如果已經點過，不允許重複選擇
                if (uiElement.style.opacity === '0.3') return;
                
                // 把選擇的形狀加入手牌 (按照挑選順序排列 0, 1, 2)
                let slotIndex = 3 - s.customPicksLeft;
                s.hand.push({ 
                    shape: item.matrix, 
                    color: item.color, 
                    x: 35 + slotIndex * 140, 
                    y: 520, 
                    origX: 35 + slotIndex * 140, 
                    origY: 520, 
                    isUsed: false 
                });
                
                // 將該卡片變暗，標記為已使用
                uiElement.style.opacity = '0.3';
                uiElement.style.pointerEvents = 'none';
                uiElement.style.filter = 'grayscale(100%)';
                
                s.customPicksLeft--;
                
                // 如果 3 次選完了，關閉面板
                if (s.customPicksLeft <= 0) {
                    s.isCustomSelecting = false; 
                    GameApp.UI.elements.customSelectPanel.style.display = 'none'; 
                }
                
                GameApp.UI.updateScoreDisplay(); this.saveCurrentGame();
            }
        };

        // ----------------------------------------------------------------------
        // MODULE: RENDERING ENGINE (渲染引擎)
        // ----------------------------------------------------------------------
        GameApp.Render = {
            gameTick: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                
                if (document.getElementById('game-screen').style.display === 'flex') {
                    for (let i = s.particles.length - 1; i >= 0; i--) {
                        let p = s.particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.alpha -= 0.02; p.radius *= 0.96; 
                        if (p.alpha <= 0) s.particles.splice(i, 1);
                    }
                    // 消除动画：从0.3爆涨到1.25，再缩小消失
                for (let i = s.clearingCells.length - 1; i >= 0; i--) {
                    const cell = s.clearingCells[i];
                    if (cell.expanding) {
                        cell.scale += 0.08;
                        if (cell.scale >= 1.25) { cell.expanding = false; }
                    } else {
                        cell.scale -= 0.06;
                    }
                    if (!cell.expanding && cell.scale < 0.05) s.clearingCells.splice(i, 1);
                }
                    for(let r=0; r<size; r++) {
                        for(let c=0; c<size; c++) {
                            let ax = (1 - s.gridBounceX[r][c]) * 0.28; s.gridVelocityX[r][c] += ax; s.gridVelocityX[r][c] *= 0.65; s.gridBounceX[r][c] += s.gridVelocityX[r][c];
                            let ay = (1 - s.gridBounceY[r][c]) * 0.28; s.gridVelocityY[r][c] += ay; s.gridVelocityY[r][c] *= 0.65; s.gridBounceY[r][c] += s.gridVelocityY[r][c];
                        }
                    }
                    if (s.allClearFlashTimer > 0) s.allClearFlashTimer -= 0.04;
                // 屏幕震动
                if (s.screenShakeTimer > 0) {
                    s.screenShakeTimer -= 0.02;
                    const arena = document.getElementById('gameArenaPanel');
                    if (arena) {
                        arena.classList.remove('screen-shake', 'screen-shake-heavy');
                        if (s.screenShakeTimer > 0) {
                            arena.classList.add(s.shakeIntensity >= 2 ? 'screen-shake-heavy' : 'screen-shake');
                        }
                    }
                }

                    this.drawGame();
                }
                requestAnimationFrame(this.gameTick.bind(this));
            },

            triggerSoftJelly: function(row, col, matrix) {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                for(let r=0; r<matrix.length; r++) {
                    for(let c=0; c<matrix[r].length; c++) {
                        if(matrix[r][c]) {
                            let tr = row + r; let tc = col + c; 
                            if(tr >= 0 && tr < size && tc >= 0 && tc < size) { s.gridBounceX[tr][tc] = 1.25; s.gridBounceY[tr][tc] = 0.75; }
                        }
                    }
                }
            },

            drawTexturedCandyCell: function(renderCtx, x, y, size, color, scaleX, scaleY) {
                renderCtx.save();
                const w = (size - 4) * scaleX; const h = (size - 4) * scaleY;
                const ox = x + 2 + (size - 4 - w)/2; const oy = y + 2 + (size - 4 - h)/2;
                
                // 圆角矩形
                const r = 4 * Math.min(scaleX, scaleY);
                renderCtx.beginPath();
                renderCtx.moveTo(ox + r, oy);
                renderCtx.lineTo(ox + w - r, oy);
                renderCtx.quadraticCurveTo(ox + w, oy, ox + w, oy + r);
                renderCtx.lineTo(ox + w, oy + h - r);
                renderCtx.quadraticCurveTo(ox + w, oy + h, ox + w - r, oy + h);
                renderCtx.lineTo(ox + r, oy + h);
                renderCtx.quadraticCurveTo(ox, oy + h, ox, oy + h - r);
                renderCtx.lineTo(ox, oy + r);
                renderCtx.quadraticCurveTo(ox, oy, ox + r, oy);
                renderCtx.closePath();
                
                // 主体颜色
                renderCtx.fillStyle = color; renderCtx.fill();
                
                // 高光渐变（上到下）
                const grad = renderCtx.createLinearGradient(ox, oy, ox, oy + h);
                grad.addColorStop(0, "rgba(255,255,255,0.55)");
                grad.addColorStop(0.25, "rgba(255,255,255,0.12)");
                grad.addColorStop(0.6, "rgba(0,0,0,0.05)");
                grad.addColorStop(1, "rgba(0,0,0,0.35)");
                renderCtx.fillStyle = grad; renderCtx.fill();
                
                // 顶部强高光（小条）
                const hGrad = renderCtx.createLinearGradient(oy, ox, oy, ox + h * 0.35);
                hGrad.addColorStop(0, "rgba(255,255,255,0.0)");
                hGrad.addColorStop(1, "rgba(255,255,255,0.0)");
                
                // 内发光边框
                renderCtx.strokeStyle = "rgba(255,255,255,0.25)"; renderCtx.lineWidth = 1.5;
                renderCtx.stroke();
                
                // 底部小反光
                const rGrad = renderCtx.createRadialGradient(ox + w/2, oy + h*0.7, 0, ox + w/2, oy + h*0.7, w*0.4);
                rGrad.addColorStop(0, "rgba(255,255,255,0.15)");
                rGrad.addColorStop(1, "rgba(255,255,255,0)");
                renderCtx.fillStyle = rGrad; renderCtx.fillRect(ox + w*0.1, oy + h*0.5, w*0.8, h*0.5);
                
                renderCtx.restore();
            },

            drawPiece: function(piece, startX, startY, cellSize) {
                const ctx = GameApp.UI.elements.ctx;
                ctx.save();
                // 手牌阴影
                piece.shape.forEach((row, rIdx) => {
                    row.forEach((val, cIdx) => {
                        if(val) {
                            ctx.fillStyle = "rgba(0,0,0,0.25)";
                            ctx.beginPath();
                            ctx.arc(startX + cIdx * cellSize + cellSize/2 + 2, startY + rIdx * cellSize + cellSize/2 + 2, cellSize*0.35, 0, Math.PI*2);
                            ctx.fill();
                        }
                    });
                });
                piece.shape.forEach((row, rIdx) => {
                    row.forEach((val, cIdx) => {
                        if(val) this.drawTexturedCandyCell(ctx, startX + cIdx * cellSize, startY + rIdx * cellSize, cellSize, piece.color, 1, 1);
                    });
                });
                ctx.restore();
            },

            drawGame: function() {
                const s = GameApp.State; const ctx = GameApp.UI.elements.ctx; const canvas = GameApp.UI.elements.canvas;
                const bCell = GameApp.Config.bCellSize; const size = GameApp.Config.bGridSize;

                ctx.clearRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = s.currentTheme.canvasFill; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        if(s.clearingCells.some(cell => cell.r === r && cell.c === c)) continue;
                        let cellVal = s.bGrid[r][c];
                        if (cellVal) this.drawTexturedCandyCell(ctx, c * bCell, r * bCell, bCell, cellVal, s.gridBounceX[r][c], s.gridBounceY[r][c]);
                        else { 
                        ctx.fillStyle = s.currentTheme.emptyCell;
                        const eR = 4;
                        ctx.beginPath();
                        ctx.moveTo(c*bCell + 2 + eR, r*bCell + 2);
                        ctx.lineTo(c*bCell + bCell - 2 - eR, r*bCell + 2);
                        ctx.quadraticCurveTo(c*bCell + bCell - 2, r*bCell + 2, c*bCell + bCell - 2, r*bCell + 2 + eR);
                        ctx.lineTo(c*bCell + bCell - 2, r*bCell + bCell - 2 - eR);
                        ctx.quadraticCurveTo(c*bCell + bCell - 2, r*bCell + bCell - 2, c*bCell + bCell - 2 - eR, r*bCell + bCell - 2);
                        ctx.lineTo(c*bCell + 2 + eR, r*bCell + bCell - 2);
                        ctx.quadraticCurveTo(c*bCell + 2, r*bCell + bCell - 2, c*bCell + 2, r*bCell + bCell - 2 - eR);
                        ctx.lineTo(c*bCell + 2, r*bCell + 2 + eR);
                        ctx.quadraticCurveTo(c*bCell + 2, r*bCell + 2, c*bCell + 2 + eR, r*bCell + 2);
                        ctx.closePath();
                        ctx.fill();
                    }
                    }
                }

                // 消除动画：先放大再缩小
                s.clearingCells.forEach(cell => {
                    ctx.save();
                    // 外发光
                    ctx.shadowColor = cell.color || '#ffffff';
                    ctx.shadowBlur = 15 * cell.scale;
                    this.drawTexturedCandyCell(ctx, cell.c * bCell, cell.r * bCell, bCell, cell.color, Math.min(cell.scale * 1.3, 1.2), Math.min(cell.scale * 1.3, 1.2));
                    ctx.restore();
                });

                if (s.selectedPiece && !s.isGameOver) {
                    const { gridX, gridY } = GameApp.Core.getSnapCoordinates();
                    if (GameApp.Core.canPlaceShape(s.selectedPiece.shape, gridY, gridX)) {
                        ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; 
                        s.selectedPiece.shape.forEach((row, rIdx) => {
                            row.forEach((val, cIdx) => { if(val) ctx.fillRect((gridX+cIdx)*bCell+2, (gridY+rIdx)*bCell+2, bCell-4, bCell-4); });
                        });
                    }
                }

                // 绘製分數飛字
                for (let fi = s.scoreFlyouts.length - 1; fi >= 0; fi--) {
                    const fl = s.scoreFlyouts[fi];
                    fl.y -= fl.vy; fl.timer -= 0.02;
                    if (fl.timer <= 0) { s.scoreFlyouts.splice(fi, 1); continue; }
                    ctx.save();
                    ctx.globalAlpha = Math.min(fl.timer * 2, 1);
                    ctx.font = 'bold 22px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = fl.color || '#ffd700';
                    ctx.shadowColor = fl.color || '#ffd700';
                    ctx.shadowBlur = 15;
                    ctx.fillText(fl.text, fl.x, fl.y);
                    ctx.restore();
                }


                s.particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); });
                
                if (s.allClearFlashTimer > 0) {
                    ctx.save(); ctx.globalAlpha = s.allClearFlashTimer; ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore();
                }

                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, canvas.width, canvas.width, canvas.height - canvas.width);
                s.hand.forEach(piece => { if (!piece.isUsed && piece !== s.selectedPiece) this.drawPiece(piece, piece.x, piece.y, 24); });
                
                // 拖拽粒子轨迹
                if (s.selectedPiece && !s.isGameOver && Math.random() > 0.6) {
                    const bx = s.mouseX + (Math.random() - 0.5) * 20;
                    const by = s.mouseY + (Math.random() - 0.5) * 20;
                    const trailColor = s.selectedPiece.color;
                    s.particles.push({ x: bx, y: by, vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 3 - 1, radius: Math.random() * 3 + 1.5, alpha: 0.6, color: trailColor });
                }

                if (s.selectedPiece && !s.isGameOver) {
                    // 拖拽粒子轨迹 
                    if (Math.random() > 0.5) {
                        const tx = s.mouseX + (Math.random() - 0.5) * 25;
                        const ty = s.mouseY + (Math.random() - 0.5) * 25;
                        s.particles.push({ x: tx, y: ty, vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 3 - 1, radius: Math.random() * 3 + 1.5, alpha: 0.5, color: s.selectedPiece.color });
                    }
                    // 拖拽时加外发光，让方块更明显
                    const dx = s.mouseX - s.dragOffset.x;
                    const dy = s.mouseY - s.dragOffset.y - 50;
                    ctx.save();
                    ctx.shadowColor = s.selectedPiece.color;
                    ctx.shadowBlur = 25;
                    this.drawPiece(s.selectedPiece, dx, dy, bCell);
                    ctx.restore();
                    // 半透明底光
                    ctx.save();
                    ctx.shadowColor = 'rgba(255,255,255,0.5)';
                    ctx.shadowBlur = 40;
                    ctx.globalAlpha = 0.25;
                    this.drawPiece(s.selectedPiece, dx, dy, bCell);
                    ctx.restore();
                    // 实心绘制
                    this.drawPiece(s.selectedPiece, dx, dy, bCell);
                }
            }
        };
        window.onload = function() {
            GameApp.UI.init();
            GameApp.I18N.init();
            GameApp.Core.init();
            console.log("All You Can Put! Grand Master Edition Initialized.");
        };

    </script>
