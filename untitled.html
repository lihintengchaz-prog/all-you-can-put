            simulateLineClear: function(shape, targetR, targetC) {
                const s = GameApp.State;
                const size = GameApp.Config.bGridSize;
                let tempGrid = s.bGrid.map(row => [...row]);
                
                // 假裝放進去
                for(let r=0; r<shape.length; r++) {
                    for(let c=0; c<shape[r].length; c++) {
                        if(shape[r][c]) tempGrid[targetR+r][targetC+c] = 1;
                    }
                }

                // 檢查是否達成整行或整列
                for(let r=0; r<size; r++) {
                    if(tempGrid[r].every(cell => cell !== 0 && cell !== '#4e566d')) return true;
                }
                for(let c=0; c<size; c++) {
                    let m = true;
                    for(let r=0; r<size; r++) {
                        if(tempGrid[r][c] === 0 || tempGrid[r][c] === '#4e566d') m = false;
                    }
                    if(m) return true;
                }
                return false;
            },


            generateHand: function() {
                const s = GameApp.State;
                s.hand = [];
                const size = GameApp.Config.bGridSize;
                const E = GameApp.Config.Shapes.easy;
                const S = GameApp.Config.Shapes.special;
                const M = GameApp.Config.Shapes.medium;
                const H = GameApp.Config.Shapes.hard;
                // 难度曲线：根据当前分数决定出牌池
                //   Phase 1 (0-200):  新手保护，基本只出简单形状
                //   Phase 2 (200-500): 少量中等形状
                //   Phase 3 (500-1000): 混合出牌
                //   Phase 4 (1000-2000): 开始出难形状
                //   Phase 5 (2000+):   真正的挑战
                let poolEasy = [...E];
                let poolMed = [...E, ...M];
                let poolAll = [...E, ...M, ...H];

                let chosenPool;
                let difficultyTier;

                if (s.currentMode === 'level') {
                    if (s.currentLevel <= 50) { chosenPool = poolEasy; difficultyTier = 0; }
                    else if (s.currentLevel <= 60) { chosenPool = poolMed; difficultyTier = 1; }
                    else { chosenPool = [...M, ...H]; difficultyTier = 2; }
                } else {
                    const sc = s.bScore;
                    // 幸运模式比无尽模式稍微难一点点（门槛降低20%）
                    const diffMod = s.currentMode === 'lucky' ? 0.8 : 1.0;
                    const adj = sc * diffMod;
                    // Phase 1 (0-5000): 纯简单，先爽再动脑
                    if (adj <= 5000) { chosenPool = poolEasy; difficultyTier = 0; }
                    // Phase 2 (5000-10000): 开始混入中等
                    else if (adj <= 10000) { 
                        chosenPool = Math.random() < 0.7 ? poolEasy : poolMed;
                        difficultyTier = 1;
                    } else if (adj <= 20000) {
                        const r = Math.random();
                        chosenPool = r < 0.4 ? poolEasy : r < 0.8 ? poolMed : poolAll;
                        difficultyTier = 2;
                    } else {
                        chosenPool = Math.random() < 0.3 ? poolMed : [...M, ...H];
                        difficultyTier = 3;
                    }
                }

                // 🎯 优先找一个能立即消除行列的形狀（所有难度都尝试，低分时更积极）  
                let lineClearPiece = null;
                if (s.currentMode === 'endless' || s.currentMode === 'lucky') {
                    let searchPool = [...E, ...M, ...H, ...S];
                    searchPool.sort(() => Math.random() - 0.5);
                    for (let p of searchPool) {
                        for (let r = 0; r < size; r++) {
                            for (let c = 0; c < size; c++) {
                                if (this.canPlaceShape(p.matrix, r, c) && this.simulateLineClear(p.matrix, r, c)) {
                                    lineClearPiece = p;
                                    break;
                                }
                            }
                            if (lineClearPiece) break;
                        }
                        if (lineClearPiece) break;
                    }
                }
                // 如果没找到能消行的，尝试找一个能放得下的形状（确保至少能放）
                let anyFitPiece = null;
                if (!lineClearPiece) {
                    let fallbackPool = [...E, ...S];
                    fallbackPool.sort(() => Math.random() - 0.5);
                    for (let p of fallbackPool) {
                        for (let r = 0; r < size; r++) {
                            for (let c = 0; c < size; c++) {
                                if (this.canPlaceShape(p.matrix, r, c)) {
                                    anyFitPiece = p;
                                    break;
                                }
                            }
                            if (anyFitPiece) break;
                        }
                        if (anyFitPiece) break;
                    }
                }

                // 发牌：3 张手牌
                for (let i = 0; i < 3; i++) {
                    let piece;
                    if (i === 0 && lineClearPiece) {
                        piece = lineClearPiece;
                    } else if (i === 0 && anyFitPiece) {
                        piece = anyFitPiece;
                    } else {
                        let pool = chosenPool;
                        piece = pool[Math.floor(Math.random() * pool.length)];
                    }
                    s.hand.push({
                        shape: piece.matrix,
                        color: piece.color,
                        x: 35 + i * 140,
                        y: 520,
                        origX: 35 + i * 140,
                        origY: 520,
                        isUsed: false
                    });
                }

                // 🎯 精准帮扶：根据棋盘空缺给玩家需要的形状
                // 随机旋转手牌（增加变化性，帮助匹配更多空缺）
                for (let i = 0; i < s.hand.length; i++) {
                    if (s.hand[i].isUsed) continue;
                    // 50%概率旋转，旋转0-3次（90度每次）
                    if (Math.random() > 0.5) {
                        const rotTimes = Math.floor(Math.random() * 4); // 0-3
                        let m = s.hand[i].shape;
                        for (let r = 0; r < rotTimes; r++) {
                            let rotated = [];
                            for (let c = 0; c < m[0].length; c++) {
                                let newRow = [];
                                for (let row = m.length - 1; row >= 0; row--) newRow.push(m[row][c]);
                                rotated.push(newRow);
                            }
                            m = rotated;
                        }
                        s.hand[i].shape = m;
                    }
                }
                                // 随机旋转手牌（增加变化性，帮助匹配更多空缺）
                for (let i = 0; i < s.hand.length; i++) {
                    if (s.hand[i].isUsed) continue;
                    if (Math.random() > 0.5) {
                        const rotTimes = Math.floor(Math.random() * 4);
                        let m = s.hand[i].shape;
                        for (let r = 0; r < rotTimes; r++) {
                            let rotated = [];
                            for (let c = 0; c < m[0].length; c++) {
                                let newRow = [];
                                for (let row = m.length - 1; row >= 0; row--) newRow.push(m[row][c]);
                                rotated.push(newRow);
                            }
                            m = rotated;
                        }
                        s.hand[i].shape = m;
                    }
                }
                // 🔄 50% chance to randomly rotate non-critical shapes (helps clear lines)
                for (let i = 0; i < s.hand.length; i++) {
                    if (!s.hand[i].isUsed && Math.random() > 0.45) {
                        // Rotate 0-3 times (90° each)
                        const rotations = Math.floor(Math.random() * 4);
                        let mat = s.hand[i].shape;
                        for (let r = 0; r < rotations; r++) {
                            const rows = mat.length;
                            const cols = mat[0].length;
                            const newMat = [];
                            for (let c = 0; c < cols; c++) {
                                newMat[c] = [];
                                for (let rr = rows - 1; rr >= 0; rr--) {
                                    newMat[c].push(mat[rr][c]);
                                }
                            }
                            mat = newMat;
                        }
                        s.hand[i].shape = mat;
                    }
                }
                this._giveHelpfulPieces(chosenPool);
                // 保底机制：如果所有手牌都无法放置，自动替换为可放置的简单形状
                this._ensurePlayableHand();
                
                // 🎨 为主题循环着色：用当前主题色板覆盖方塊颜色
                const themeColors = s.currentTheme.colors;
                s.hand.forEach((piece, idx) => {
                    if (!piece.isUsed) {
                        piece.color = themeColors[idx % themeColors.length];
                    }
                });

                this.saveCurrentGame();
            },

            // 🎯 精准帮扶：扫描棋盘找出差1格就能消的行列，给玩家需要的形状
            _giveHelpfulPieces: function(pool) {
                const s = GameApp.State;
                const size = GameApp.Config.bGridSize;
                const E = GameApp.Config.Shapes.easy;

                // 智能辅助：混搭有益形状，不暴露 AI 痕迹
                // 先找完全能消行的形状（最高优先级，但只替换1张）
                const allShapes = [...E, ...GameApp.Config.Shapes.medium, ...GameApp.Config.Shapes.hard];
                let lineClearPick = null;
                
                for (let p of allShapes) {
                    for (let r = 0; r < size; r++) {
                        for (let c = 0; c < size; c++) {
                            if (this.canPlaceShape(p.matrix, r, c) && this.simulateLineClear(p.matrix, r, c)) {
                                let cells = 0;
                                p.matrix.forEach(row => row.forEach(v => { if(v) cells++; }));
                                if (!lineClearPick || cells > 0) {
                                    lineClearPick = { shape: p.matrix, color: p.color };
                                }
                            }
                        }
                    }
                }

                // 自然混搭：收集各种有益形状
                let helpers = [];

                // 行列缺口检测（仅连续空缺）
                for (let r = 0; r < size; r++) {
                    let empties = [];
                    for (let c = 0; c < size; c++) {
                        if (s.bGrid[r][c] === 0) empties.push(c);
                    }
                    if (empties.length === 1) {
                        helpers.push({ shape: [[1]], color: '#00ff66', priority: 5 });
                    } else if (empties.length === 2 && empties[1] - empties[0] === 1) {
                        helpers.push({ shape: [[1,1]], color: '#ffea00', priority: 4 });
                    } else if (empties.length === 3 && empties[2] - empties[0] === 2) {
                        helpers.push({ shape: [[1,1,1]], color: '#00e5ff', priority: 3 });
                    } else if (empties.length === 4 && empties[3] - empties[0] === 3) {
                        helpers.push({ shape: [[1,1,1,1]], color: '#ff6d00', priority: 2 });
                    }
                }
                for (let c = 0; c < size; c++) {
                    let empties = [];
                    for (let r = 0; r < size; r++) {
                        if (s.bGrid[r][c] === 0) empties.push(r);
                    }
                    if (empties.length === 2 && empties[1] - empties[0] === 1) {
                        helpers.push({ shape: [[1],[1]], color: '#ffea00', priority: 4 });
                    } else if (empties.length === 3 && empties[2] - empties[0] === 2) {
                        helpers.push({ shape: [[1],[1],[1]], color: '#00e5ff', priority: 3 });
                    }
                }

                // 检测2x2方块空缺和3x2空缺，给对应形状
                if (Math.random() > 0.4) {
                    for (let r = 0; r < size - 1; r++) {
                        for (let c = 0; c < size - 1; c++) {
                            if (s.bGrid[r][c] === 0 && s.bGrid[r][c+1] === 0 && 
                                s.bGrid[r+1][c] === 0 && s.bGrid[r+1][c+1] === 0) {
                                helpers.push({ shape: [[1,1],[1,1]], color: '#ff3377', priority: 6 });
                            }
                        }
                    }
                    // 3x2矩形空缺
                    for (let r = 0; r < size - 2; r++) {
                        for (let c = 0; c < size - 1; c++) {
                            if (s.bGrid[r][c] === 0 && s.bGrid[r][c+1] === 0 &&
                                s.bGrid[r+1][c] === 0 && s.bGrid[r+1][c+1] === 0 &&
                                s.bGrid[r+2][c] === 0 && s.bGrid[r+2][c+1] === 0) {
                                const bigRect = Math.random() > 0.5 ? 
                                    { shape: [[1,1,1],[1,1,1]], color: '#00e5ff' } :  // 3x2
                                    { shape: [[1,1],[1,1],[1,1]], color: '#00e5ff' };  // 2x3
                                helpers.push(bigRect);
                            }
                        }
                    }
                    // 3x3大正方形空缺
                    if (Math.random() > 0.5) {
                        for (let r = 0; r < size - 2; r++) {
                            for (let c = 0; c < size - 2; c++) {
                                let empty = true;
                                for (let dr = 0; dr < 3 && empty; dr++)
                                    for (let dc = 0; dc < 3 && empty; dc++)
                                        if (s.bGrid[r+dr][c+dc] !== 0) empty = false;
                                if (empty) {
                                    helpers.push({ shape: [[1,1,1],[1,1,1],[1,1,1]], color: '#d500f9', priority: 7 });
                                }
                            }
                        }
                    }
                    // 偶尔给3x3大L
                    if (Math.random() > 0.6) {
                        for (let r = 0; r < size - 2; r++) {
                            for (let c = 0; c < size - 2; c++) {
                                if (s.bGrid[r][c] === 0 && s.bGrid[r+1][c] === 0 && s.bGrid[r+2][c] === 0 &&
                                    s.bGrid[r+2][c+1] === 0 && s.bGrid[r+2][c+2] === 0) {
                                    helpers.push({ shape: [[1,0,0],[1,0,0],[1,1,1]], color: '#ff6d00', priority: 5 });
                                }
                            }
                        }
                    }
                }

                // 从随机池中挑选1-2个助手形状（混搭，不全是同一种）
                const finalPicks = [];
                if (lineClearPick && Math.random() > 0.3) {
                    finalPicks.push(lineClearPick);
                }
                if (helpers.length > 0) {
                    helpers.sort(() => Math.random() - 0.5);
                    const pickCount = Math.min(helpers.length, Math.random() > 0.5 ? 2 : 1);
                    for (let i = 0; i < pickCount; i++) {
                        finalPicks.push(helpers[i]);
                    }
                }

                // 应用替换（只换1-2张，保留随机性）
                let idx = 0;
                for (let i = 0; i < s.hand.length && idx < finalPicks.length; i++) {
                    if (!s.hand[i].isUsed) {
                        s.hand[i].shape = finalPicks[idx].shape;
                        s.hand[i].color = finalPicks[idx].color;
                        idx++;
                    }
                }
            },

            // 保底：逐一检查每张手牌，确保都能放置；不能放的就替换成简单形状
            _ensurePlayableHand: function() {
                const s = GameApp.State;
                const size = GameApp.Config.bGridSize;
                const E = GameApp.Config.Shapes.easy;
                const S = GameApp.Config.Shapes.special;
                const pool = [...E, ...S];

                for (let i = 0; i < s.hand.length; i++) {
                    if (s.hand[i].isUsed) continue;
                    let playable = false;
                    for (let r = 0; r < size; r++) {
                        for (let c = 0; c < size; c++) {
                            if (this.canPlaceShape(s.hand[i].shape, r, c)) {
                                playable = true;
                                break;
                            }
                        }
                        if (playable) break;
                    }
                    if (!playable) {
                        // 暴力替换到有能放的为止
                        for (let attempts = 0; attempts < 50; attempts++) {
                            let testPiece = pool[Math.floor(Math.random() * pool.length)];
                            for (let r = 0; r < size; r++) {
                                for (let c = 0; c < size; c++) {
                                    if (this.canPlaceShape(testPiece.matrix, r, c)) {
                                        s.hand[i].shape = testPiece.matrix;
                                        s.hand[i].color = testPiece.color;
                                        playable = true;
                                        break;
                                    }
                                }
                                if (playable) break;
                            }
                            if (playable) break;
                        }
                    }
                }
            },

            triggerHapticShock: function(duration) {
                if (navigator.vibrate) {
                    try { navigator.vibrate(duration); } catch(e) {}
                }
            },

            checkAndApplyDynamicTheme: function() {
                const body = document.body;
                const arenaPanel = document.getElementById('gameArenaPanel');
                const s = GameApp.State;
                const themes = GameApp.Config.Themes;
                
                // 每1000分循環切換主題（最多到10000分以上取模循環）
                const themeIndex = Math.min(Math.floor(s.bScore / 1000), themes.length - 1);
                const prevThemeIndex = s.currentThemeIndex || 0;
                s.currentTheme = themes[themeIndex];

                body.style.background = s.currentTheme.bg;
                arenaPanel.style.background = s.currentTheme.panel;
                
                // 切換主題時播放里程碑音效
                if (themeIndex > prevThemeIndex && s.bScore > 0) {
                    GameApp.Audio.milestone();
                }
                
                // 保存當前主題索引供生成方塊時使用
                s.currentThemeIndex = themeIndex;
            },

            getSnapCoordinates: function() {
                const s = GameApp.State; const cellSize = GameApp.Config.bCellSize;
                const targetX = s.mouseX - s.dragOffset.x; const targetY = s.mouseY - s.dragOffset.y - 50; 
                return { gridX: Math.round(targetX / cellSize), gridY: Math.round(targetY / cellSize) };
            },

            canPlaceShape: function(shape, targetR, targetC) {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                for(let r=0; r<shape.length; r++) {
                    for(let c=0; c<shape[r].length; c++) {
                        if(shape[r][c]) {
                            let nr = targetR + r; let nc = targetC + c;
                            if(nr < 0 || nr >= size || nc < 0 || nc >= size || s.bGrid[nr][nc] !== 0) return false;
                        }
                    }
                }
                return true;
            },

            placeShape: function(shape, targetR, targetC, color, scoreGain) {
                const s = GameApp.State;
                for(let r=0; r<shape.length; r++) {
                    for(let c=0; c<shape[r].length; c++) {
                        if(shape[r][c]) s.bGrid[targetR+r][targetC+c] = color;
                    }
                }
                s.bScore += Math.round(scoreGain * s.currentMultiplier);
                GameApp.UI.updateScoreDisplay(); this.checkAndApplyDynamicTheme();
            },

            checkAllClearCondition: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                let isBoardEmpty = true;
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        if(s.bGrid[r][c] !== 0 && s.bGrid[r][c] !== '#4e566d') { isBoardEmpty = false; break; }
                    }
                    if(!isBoardEmpty) break;
                }
                if (isBoardEmpty) {
                    s.allClearCount++;
                    if (s.allClearCount === 1) s.currentMultiplier = 2.0;
                    else s.currentMultiplier = 3.0; 
                    
                    this.triggerHapticShock(80);
                    GameApp.Vibe.celebration();
                    GameApp.Audio.allClear();
                    s.allClearFlashTimer = 1.2;
                    s.screenShakeTimer = 1.0;
                    s.shakeIntensity = 3;
                    GameApp.Core.showComboPopup(0);
                    const cx = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    const cy = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    s.scoreFlyouts.push({ x: cx, y: cy, vy: 2.2, text: "\u2728 ALL CLEAR x" + s.allClearCount + "!", color: "#ffd700", timer: 1.5, color: "#ffd700", timer: 1.2 });
                    GameApp.UI.updateScoreDisplay();
                }
            },

            checkLineClears: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                let rows = []; let cols = [];
                
                for(let r=0; r<size; r++) if(s.bGrid[r].every(cell => cell !== 0 && cell !== '#4e566d')) rows.push(r);
                for(let c=0; c<size; c++) {
                    let m = true;
                    for(let r=0; r<size; r++) if(s.bGrid[r][c] === 0 || s.bGrid[r][c] === '#4e566d') m = false;
                    if(m) cols.push(c);
                }
                
                let linesCount = rows.length + cols.length;
                
                if (s.currentMode === 'lucky' && linesCount > 0) {
                    s.luckyLinesNeeded -= linesCount;
                    if (s.luckyLinesNeeded <= 0) {
                        s.luckyLinesNeeded = GameApp.Config.luckyLineTarget;
                        setTimeout(this.triggerChestPopup.bind(this), 500); 
                    }
                }

                if (linesCount > 0) {
                    GameApp.Vibe.heavy();
                    GameApp.Audio.multiClear(linesCount);
                    this.triggerHapticShock(35 * linesCount);
                    GameApp.Core.showComboPopup(linesCount);
                    s.screenShakeTimer = 0.4 + linesCount * 0.08;
                    s.shakeIntensity = linesCount >= 5 ? 3 : linesCount >= 3 ? 2 : 1;
                    const cx = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    const cy = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                    // 同时消除行数直接做倍数：清1行=100分，2行=400分，3行=900分，4行=1600分
                    const comboMult = linesCount * linesCount;
                    const bonus = Math.round(comboMult * 100 * (s.currentMode === 'lucky' ? s.currentMultiplier : 1));
                    // 消除分数飞字更大更持久（增强版）
                    const flyFontSize = bonus > 1000 ? 48 : bonus > 500 ? 40 : bonus > 200 ? 34 : 28;
                    s.scoreFlyouts.push({ x: cx, y: cy + 10, vy: 1.2, text: "+" + bonus, color: linesCount >= 4 ? "#d500f9" : linesCount >= 3 ? "#ffd700" : "#00e5ff", timer: 1.6 });
                }

                const bCell = GameApp.Config.bCellSize;
                // 超级粒子爆炸（增强版：更多更大）
                const burstCount = Math.min(linesCount * 15, 80);
                for (let i = 0; i < burstCount; i++) {
                    setTimeout(() => {
                        const rx = Math.random() * 8 * bCell;
                        const ry = Math.random() * 8 * bCell;
                        if (i % 3 === 0) {
                            s.particles.push({ x: rx, y: ry, vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.8) * 18, radius: Math.random() * 7 + 3, alpha: 1, color: '#ffd700' });
                        } else if (i % 3 === 1) {
                            s.particles.push({ x: rx, y: ry, vx: (Math.random() - 0.5) * 22, vy: (Math.random() - 0.8) * 15, radius: Math.random() * 6 + 2, alpha: 1, color: '#00e5ff' });
                        } else {
                            s.particles.push({ x: rx, y: ry, vx: (Math.random() - 0.5) * 24, vy: (Math.random() - 0.8) * 17, radius: Math.random() * 6 + 2, alpha: 1, color: '#ff3377' });
                        }
                    }, i * 20);
                }
                rows.forEach((r, rIndex) => {
                    setTimeout(() => {
                        for(let c=0; c<size; c++) {
                            s.clearingCells.push({ r: r, c: c, color: s.bGrid[r][c], scale: 0.3, expanding: true });
                            this.generateParticles(c * bCell + bCell/2, r * bCell + bCell/2, s.bGrid[r][c]);
                        }
                    }, rIndex * 80);
                });

                cols.forEach((c, cIndex) => {
                    setTimeout(() => {
                        for(let r=0; r<size; r++) {
                            if(!s.clearingCells.some(cell => cell.r === r && cell.c === c)) {
                                s.clearingCells.push({ r: r, c: c, color: s.bGrid[r][c], scale: 0.3, expanding: true });
                                this.generateParticles(c * bCell + bCell/2, r * bCell + bCell/2, s.bGrid[r][c]);
                            }
                        }
                    }, cIndex * 80);
                });

                rows.forEach(r => s.bGrid[r].fill(0));
                cols.forEach(c => { for(let r=0; r<size; r++) s.bGrid[r][c] = 0; });
                
                if(linesCount > 0) {
                    const comboMult = linesCount * linesCount;
                    s.bScore += Math.round(comboMult * 100 * (s.currentMode === 'lucky' ? s.currentMultiplier : 1));
                    GameApp.UI.updateScoreDisplay();
                }
            },

            generateParticles: function(x, y, color) {
                const s = GameApp.State;
                for(let i=0; i<20; i++) {
                    s.particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.8) * 12, radius: Math.random() * 4.5 + 1.5, alpha: 1, color: color });
                }
            },

            checkGameOver: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                let remains = s.hand.filter(p => !p.isUsed);
                if(remains.length === 0) return false;
                for(let piece of remains) {
                    for(let r=0; r<size; r++) {
                        for(let c=0; c<size; c++) {
                            if(this.canPlaceShape(piece.shape, r, c)) return false; 
                        }
                    }
                }
                return true; 
            },

            getEventPos: function(e) {
                const canvas = GameApp.UI.elements.canvas;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                // 缩放到 Canvas 内部坐标系（解决手机触摸坐标偏移）
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            },

            isInteractionBlocked: function() {
                const ui = GameApp.UI.elements; const s = GameApp.State;
                return (s.isGameOver || ui.settingsOverlay.style.display === 'flex' || ui.luckyChestOverlay.style.display === 'flex' || s.isCustomSelecting);
            },

            showPrize: function(icon, title, desc, color) {
                const overlay = document.getElementById('prize-overlay');
                if (!overlay) return;
                const s = GameApp.State;
                // 全屏粒子爆发
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => {
                        s.particles.push({ x: 40 + Math.random() * 360, y: 40 + Math.random() * 360, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.8) * 16, radius: Math.random() * 5 + 2, alpha: 1, color: color || '#ffd700' });
                    }, i * 15);
                }
                overlay.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;animation:prizePopIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;"><div style="font-size:clamp(3rem,10vw,5rem);filter:drop-shadow(0 0 30px ' + (color||'#ffd700') + ');animation:prizeIconBounce 1s ease-in-out infinite;">' + icon + '</div><div style="font-size:clamp(1.8rem,5vw,2.5rem);font-weight:900;color:#fff;text-shadow:0 0 30px ' + (color||'#ffd700') + ',0 0 60px ' + (color||'#ffd700') + ';margin-top:10px;">' + title + '</div><div style="font-size:clamp(0.9rem,2.5vw,1.2rem);color:rgba(255,255,255,0.8);margin-top:8px;text-shadow:0 0 20px rgba(0,0,0,0.5);">' + desc + '</div></div>';
                // 屏幕闪 + 震动
                const flash = document.getElementById('gameArenaPanel');
                if (flash) { flash.style.transition = 'box-shadow 0.3s'; flash.style.boxShadow = 'inset 0 0 80px ' + (color||'#ffd700'); setTimeout(() => { flash.style.boxShadow = ''; }, 400); }
                s.screenShakeTimer = 0.3;
                GameApp.Vibe.celebration();
                setTimeout(() => { overlay.innerHTML = ''; }, 1800);
            },

            bindEvents: function() {
                const canvas = GameApp.UI.elements.canvas;
                
                canvas.addEventListener('mousedown', (e) => {
                    if (this.isInteractionBlocked()) return;
                    this.handleInputStart(this.getEventPos(e));
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    if (this.isInteractionBlocked()) return;
                    this.handleInputMove(this.getEventPos(e));
                });
                
                window.addEventListener('mouseup', () => {
                    if (GameApp.State.selectedPiece) {
                        this.handleInputEnd();
                    }
                });

                canvas.addEventListener('touchstart', (e) => {
                    if (this.isInteractionBlocked()) return; e.preventDefault();
                    this.handleInputStart(this.getEventPos(e));
                }, { passive: false });
                
                canvas.addEventListener('touchmove', (e) => {
                    if (this.isInteractionBlocked()) return; e.preventDefault();
                    this.handleInputMove(this.getEventPos(e));
                }, { passive: false });
                
                window.addEventListener('touchend', () => {
                    if (GameApp.State.selectedPiece) {
                        this.handleInputEnd();
                    }
                });
            },

            handleInputStart: function(pos) {
                const s = GameApp.State; const bCell = GameApp.Config.bCellSize;
                s.mouseX = pos.x; s.mouseY = pos.y;
                s.lastHoverR = -1; s.lastHoverC = -1;
                
                s.hand.forEach(piece => {
                    if(piece.isUsed) return;
                    if(s.mouseX >= piece.x - 35 && s.mouseX <= piece.x + 155 && s.mouseY >= piece.y - 30 && s.mouseY <= piece.y + 150) {
                        s.selectedPiece = piece;
                        s.dragOffset.x = (piece.shape[0].length * bCell) / 2;
                        s.dragOffset.y = (piece.shape.length * bCell) / 2;
                        GameApp.Audio.pick();
                    }
                });
            },

            handleInputMove: function(pos) {
                const s = GameApp.State;
                s.mouseX = pos.x; s.mouseY = pos.y;
                
                if (s.selectedPiece && !s.isGameOver) {
                    // 每帧都震，配合节流自动控制频率，手指划过屏幕有连续沙沙感
                    GameApp.Vibe.light();
                    // 格子吸附震动（进新格子加额外反馈）
                    const bCell = GameApp.Config.bCellSize;
                    const hoverR = Math.floor(pos.y / bCell);
                    const hoverC = Math.floor(pos.x / bCell);
                    if ((hoverR !== s.lastHoverR || hoverC !== s.lastHoverC) && hoverR >= 0 && hoverR < 8 && hoverC >= 0 && hoverC < 8) {
                        s.lastHoverR = hoverR;
                        s.lastHoverC = hoverC;
                        GameApp.Vibe.medium();
                    }
                } else {
                    s.lastHoverR = -1;
                    s.lastHoverC = -1;
                }
            },

            handleInputEnd: function() {
                const s = GameApp.State;
                s.lastHoverR = -1; s.lastHoverC = -1;
                const piece = s.selectedPiece;
                if (!piece) return;
                
                const bCell = GameApp.Config.bCellSize;
                const { gridX, gridY } = this.getSnapCoordinates();
                
                if (!s.isGameOver && !s.isCustomSelecting && this.canPlaceShape(piece.shape, gridY, gridX)) {
                    // 基础分 = 方块格数 × (10 + 格数×2)，大块高分小块低分
                    let cells = 0;
                    s.selectedPiece.shape.forEach(row => row.forEach(v => { if(v) cells++; }));
                    let baseGain = cells * (10 + cells * 2); let finalGain = Math.round(baseGain * s.currentMultiplier);
                    this.placeShape(s.selectedPiece.shape, gridY, gridX, s.selectedPiece.color, finalGain);
                    // 放置分数飞字
                    const fcx = gridX * bCell + (s.selectedPiece.shape[0].length * bCell) / 2;
                    const fcy = gridY * bCell - 10;
                    const fcolor = cells >= 4 ? '#d500f9' : cells >= 3 ? '#00e5ff' : '#00ff66';
                    // 放置分数飞字更大
                    const pFontSize = finalGain > 200 ? 32 : finalGain > 80 ? 26 : 22;
                    s.scoreFlyouts.push({ x: fcx, y: fcy, vy: 1.2, text: '+' + finalGain, color: fcolor, timer: 1.3 });
                    GameApp.Render.triggerSoftJelly(gridY, gridX, s.selectedPiece.shape);
                    GameApp.Vibe.medium();
                    GameApp.Audio.place();
                    s.selectedPiece.isUsed = true;
                    this.triggerHapticShock(20); 
                    

                    this.checkLineClears(); this.checkAllClearCondition();
                    if(s.hand.every(p => p.isUsed)) this.generateHand();
                    
                    if (s.currentMode === 'endless' || s.currentMode === 'lucky') {
                        if (s.bScore > s.bBestScore) { s.bBestScore = s.bScore; this.saveBestScore(); GameApp.UI.elements.topBestText.innerText = `${GameApp.I18N.getText('best')}: ${s.bBestScore}`; }
                        this.saveCurrentGame();
                    }
                    if (s.currentMode === 'level' && s.bScore >= s.targetScore) GameApp.UI.showGameOverModal(true);
                    else if(this.checkGameOver()) GameApp.UI.showGameOverModal(false);
                } else if (!s.isGameOver && !s.isCustomSelecting) {
                    GameApp.Audio.invalid();
                }
                s.selectedPiece = null; 
            },
            // 🔮 寶箱與自選 3 連抽系統 (PICK 3 SYSTEM)
            triggerChestPopup: function() {
                const s = GameApp.State;
                s.selectedPiece = null; 
                GameApp.UI.elements.luckyChestOverlay.style.display = 'flex';
            },

                        const cy = GameApp.Config.bGridSize * GameApp.Config.bCellSize / 2;
                        s.scoreFlyouts.push({ x: cx, y: cy, vy: 2.5, text: '💰 +' + bonus, color: '#ffd700', timer: 1.5 });
                        GameApp.Core.showPrize('💰', 'BONUS!', t.getText('prizeBonus') + bonus + t.getText('prizeBonusEnd'), '#ffd700');
                    }},
                    { chance: 0.15, name: 'rowclear', exec: function() {
                        const size = GameApp.Config.bGridSize;
                        const bCell = GameApp.Config.bCellSize;
                        // 找填最满的行来清除
                        let bestRow = -1;
                        let mostFilled = 0;

                            for (let c = 0; c < size; c++) {

                            }
                            if (filled > mostFilled) { mostFilled = filled; bestRow = r; }
                        }
                        if (bestRow >= 0) {
                            for (let c = 0; c < size; c++) {
                                if (s.bGrid[bestRow][c] !== '#4e566d') {
                                    s.bGrid[bestRow][c] = 0;
                                    GameApp.Core.generateParticles(c * bCell + bCell/2, bestRow * bCell + bCell/2, '#ff6d00');
                                }
                            }
                            // 宝箱清屏也增加倍数（+0.2，最高2.0）

                            GameApp.Vibe.celebration();
                            s.screenShakeTimer = 0.5;
                            s.bScore += Math.round(50 * s.currentMultiplier);

                        } else {
                            GameApp.Core.showPrize('🎁', 'EMPTY!', t.getText('prizeEmpty'), '#00e5ff');
                            s.bScore += 100;
                        }
                    }},
                    { chance: 0.21, name: 'fullclear', exec: function() {
                        // 全清！清空整個棋盤
                        const size = GameApp.Config.bGridSize;
                        const bCell = GameApp.Config.bCellSize;
                        for (let r = 0; r < size; r++) {
                            for (let c = 0; c < size; c++) {
                                if (s.bGrid[r][c] !== '#4e566d') {
                                    s.bGrid[r][c] = 0;
                                    GameApp.Core.generateParticles(c * bCell + bCell/2, r * bCell + bCell/2, '#ffd700');
                                }

                        s.currentMultiplier = Math.min(2.0, s.currentMultiplier + 0.2);

                        // 全屏粒子爆发
                        for (let i = 0; i < 80; i++) {
                            setTimeout(() => {
                                s.particles.push({ x: Math.random() * 440, y: Math.random() * 440, vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.8) * 20, radius: Math.random() * 6 + 2, alpha: 1, color: ['#ffd700','#ff3377','#00e5ff','#d500f9','#00ff66'][Math.floor(Math.random()*5)] });
                            }, i * 10);
                        }
                        GameApp.Core.showPrize('🌈', 'FULL CLEAR!', t.getText('prizeFullClear') + s.currentMultiplier.toFixed(1) + 'x', '#ffd700');
                    }},
                    { chance: 0.12, name: 'wildswap', exec: function() {
                        // 換牌：獲得一組高級形狀
                        const pool = [...GameApp.Config.Shapes.medium, ...GameApp.Config.Shapes.hard, ...GameApp.Config.Shapes.hard];
                        s.hand = [];
                        const themeColors = s.currentTheme.colors;
                        for (let i = 0; i < 3; i++) {
                            const pick = pool[Math.floor(Math.random() * pool.length)];
                            s.hand.push({ shape: pick.matrix, color: themeColors[i % themeColors.length], x: 35 + i * 140, y: 520, origX: 35 + i * 140, origY: 520, isUsed: false });
                        }
                        GameApp.Core.showPrize('🔄', 'WILDSWAP!', t.getText('prizeWildswap'), '#d500f9');
                    }},
                    { chance: 0.08, name: 'select', exec: function() {
                        s.isCustomSelecting = true;
                        s.hand = [];
                        s.customPicksLeft = 3;
                        document.querySelectorAll('.select-item-card').forEach(el => {
                            el.style.opacity = '1';

                        });

                // 按機率抽選

                    cumulative += prize.chance;
                    if (r < cumulative) {

                        break;

                }
                
                GameApp.UI.updateScoreDisplay(); this.saveCurrentGame();
            },



            // 🎯 Combo / 全清 弹出大字

            selectThisCustomShape: function(item, uiElement) {
                const s = GameApp.State;
                if (!s.isCustomSelecting) return;
                
                // 如果已經點過，不允許重複選擇
                if (uiElement.style.opacity === '0.3') return;
                
                // 把選擇的形狀加入手牌 (按照挑選順序排列 0, 1, 2)
                let slotIndex = 3 - s.customPicksLeft;
                s.hand.push({ 
                    shape: item.matrix, 
                    color: item.color, 
                    x: 35 + slotIndex * 140, 
                    y: 520, 
                    origX: 35 + slotIndex * 140, 
                    origY: 520, 
                    isUsed: false 
                });
                
                // 將該卡片變暗，標記為已使用
                uiElement.style.opacity = '0.3';
                uiElement.style.pointerEvents = 'none';
                uiElement.style.filter = 'grayscale(100%)';
                
                s.customPicksLeft--;
                
                // 如果 3 次選完了，關閉面板
                if (s.customPicksLeft <= 0) {
                    s.isCustomSelecting = false; 
                    GameApp.UI.elements.customSelectPanel.style.display = 'none'; 
                }
                
                GameApp.UI.updateScoreDisplay(); this.saveCurrentGame();
            }
        };

        // ----------------------------------------------------------------------
        // MODULE: RENDERING ENGINE (渲染引擎)
        // ----------------------------------------------------------------------
        GameApp.Render = {
            gameTick: function() {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                
                if (document.getElementById('game-screen').style.display === 'flex') {
                    for (let i = s.particles.length - 1; i >= 0; i--) {
                        let p = s.particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.alpha -= 0.02; p.radius *= 0.96; 
                        if (p.alpha <= 0) s.particles.splice(i, 1);
                    }
                    // 消除动画：从0.3爆涨到1.25，再缩小消失
                for (let i = s.clearingCells.length - 1; i >= 0; i--) {
                    const cell = s.clearingCells[i];
                    if (cell.expanding) {
                        cell.scale += 0.08;
                        if (cell.scale >= 1.25) { cell.expanding = false; }
                    } else {
                        cell.scale -= 0.06;
                    }
                    if (!cell.expanding && cell.scale < 0.05) s.clearingCells.splice(i, 1);
                }
                    for(let r=0; r<size; r++) {
                        for(let c=0; c<size; c++) {
                            let ax = (1 - s.gridBounceX[r][c]) * 0.28; s.gridVelocityX[r][c] += ax; s.gridVelocityX[r][c] *= 0.65; s.gridBounceX[r][c] += s.gridVelocityX[r][c];
                            let ay = (1 - s.gridBounceY[r][c]) * 0.28; s.gridVelocityY[r][c] += ay; s.gridVelocityY[r][c] *= 0.65; s.gridBounceY[r][c] += s.gridVelocityY[r][c];
                        }
                    }
                    if (s.allClearFlashTimer > 0) s.allClearFlashTimer -= 0.04;
                // 屏幕震动
                if (s.screenShakeTimer > 0) {
                    s.screenShakeTimer -= 0.02;
                    const arena = document.getElementById('gameArenaPanel');
                    if (arena) {
                        arena.classList.remove('screen-shake', 'screen-shake-heavy');
                        if (s.screenShakeTimer > 0) {
                            arena.classList.add(s.shakeIntensity >= 2 ? 'screen-shake-heavy' : 'screen-shake');
                        }
                    }
                }

                    this.drawGame();
                }
                requestAnimationFrame(this.gameTick.bind(this));
            },

            triggerSoftJelly: function(row, col, matrix) {
                const s = GameApp.State; const size = GameApp.Config.bGridSize;
                for(let r=0; r<matrix.length; r++) {
                    for(let c=0; c<matrix[r].length; c++) {
                        if(matrix[r][c]) {
                            let tr = row + r; let tc = col + c; 
                            if(tr >= 0 && tr < size && tc >= 0 && tc < size) { s.gridBounceX[tr][tc] = 1.25; s.gridBounceY[tr][tc] = 0.75; }
                        }
                    }
                }
            },

            drawTexturedCandyCell: function(renderCtx, x, y, size, color, scaleX, scaleY) {
                renderCtx.save();
                const w = (size - 4) * scaleX; const h = (size - 4) * scaleY;
                const ox = x + 2 + (size - 4 - w)/2; const oy = y + 2 + (size - 4 - h)/2;
                
                // 圆角矩形
                const r = 4 * Math.min(scaleX, scaleY);
                renderCtx.beginPath();
                renderCtx.moveTo(ox + r, oy);
                renderCtx.lineTo(ox + w - r, oy);
                renderCtx.quadraticCurveTo(ox + w, oy, ox + w, oy + r);
                renderCtx.lineTo(ox + w, oy + h - r);
                renderCtx.quadraticCurveTo(ox + w, oy + h, ox + w - r, oy + h);
                renderCtx.lineTo(ox + r, oy + h);
                renderCtx.quadraticCurveTo(ox, oy + h, ox, oy + h - r);
                renderCtx.lineTo(ox, oy + r);
                renderCtx.quadraticCurveTo(ox, oy, ox + r, oy);
                renderCtx.closePath();
                
                // 主体颜色
                renderCtx.fillStyle = color; renderCtx.fill();
                
                // 高光渐变（上到下）
                const grad = renderCtx.createLinearGradient(ox, oy, ox, oy + h);
                grad.addColorStop(0, "rgba(255,255,255,0.55)");
                grad.addColorStop(0.25, "rgba(255,255,255,0.12)");
                grad.addColorStop(0.6, "rgba(0,0,0,0.05)");
                grad.addColorStop(1, "rgba(0,0,0,0.35)");
                renderCtx.fillStyle = grad; renderCtx.fill();
                
                // 顶部强高光（小条）
                const hGrad = renderCtx.createLinearGradient(oy, ox, oy, ox + h * 0.35);
                hGrad.addColorStop(0, "rgba(255,255,255,0.0)");
                hGrad.addColorStop(1, "rgba(255,255,255,0.0)");
                
                // 内发光边框
                renderCtx.strokeStyle = "rgba(255,255,255,0.25)"; renderCtx.lineWidth = 1.5;
                renderCtx.stroke();
                
                // 底部小反光
                const rGrad = renderCtx.createRadialGradient(ox + w/2, oy + h*0.7, 0, ox + w/2, oy + h*0.7, w*0.4);
                rGrad.addColorStop(0, "rgba(255,255,255,0.15)");
                rGrad.addColorStop(1, "rgba(255,255,255,0)");
                renderCtx.fillStyle = rGrad; renderCtx.fillRect(ox + w*0.1, oy + h*0.5, w*0.8, h*0.5);
                
                renderCtx.restore();
            },

            drawPiece: function(piece, startX, startY, cellSize) {
                const ctx = GameApp.UI.elements.ctx;
                ctx.save();
                // 手牌阴影（增强）
                piece.shape.forEach((row, rIdx) => {
                    row.forEach((val, cIdx) => {
                        if(val) {
                            ctx.fillStyle = "rgba(0,0,0,0.35)";
                            ctx.beginPath();
                            ctx.arc(startX + cIdx * cellSize + cellSize/2 + 3, startY + rIdx * cellSize + cellSize/2 + 3, cellSize*0.4, 0, Math.PI*2);
                            ctx.fill();
                        }
                    });
                });
                piece.shape.forEach((row, rIdx) => {
                    row.forEach((val, cIdx) => {
                        if(val) {
                            // 底部发光
                            const glow = ctx.createRadialGradient(
                                startX + cIdx * cellSize + cellSize/2, startY + rIdx * cellSize + cellSize/2, 0,
                                startX + cIdx * cellSize + cellSize/2, startY + rIdx * cellSize + cellSize/2, cellSize
                            );
                            glow.addColorStop(0, piece.color + '40');
                            glow.addColorStop(1, 'transparent');
                            ctx.fillStyle = glow;
                            ctx.fillRect(startX + cIdx * cellSize - 5, startY + rIdx * cellSize - 5, cellSize + 10, cellSize + 10);
                            this.drawTexturedCandyCell(ctx, startX + cIdx * cellSize, startY + rIdx * cellSize, cellSize, piece.color, 1, 1);
                        }
                    });
                });
                ctx.restore();
            },

            drawGame: function() {
                const s = GameApp.State; const ctx = GameApp.UI.elements.ctx; const canvas = GameApp.UI.elements.canvas;
                const bCell = GameApp.Config.bCellSize; const size = GameApp.Config.bGridSize;

                ctx.clearRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = s.currentTheme.canvasFill; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        let cellVal = s.bGrid[r][c];
                        // 跳过正在消除动画的格子（它们在后面单独渲染）
                        if(s.clearingCells.some(cell => cell.r === r && cell.c === c)) continue;
                        if (cellVal && cellVal !== '#4e566d') this.drawTexturedCandyCell(ctx, c * bCell, r * bCell, bCell, cellVal, s.gridBounceX[r][c], s.gridBounceY[r][c]);
                        else if (!cellVal) { 
                        ctx.fillStyle = s.currentTheme.emptyCell;
                        const eR = 4;
                        ctx.beginPath();
                        ctx.moveTo(c*bCell + 2 + eR, r*bCell + 2);
                        ctx.lineTo(c*bCell + bCell - 2 - eR, r*bCell + 2);
                        ctx.quadraticCurveTo(c*bCell + bCell - 2, r*bCell + 2, c*bCell + bCell - 2, r*bCell + 2 + eR);
                        ctx.lineTo(c*bCell + bCell - 2, r*bCell + bCell - 2 - eR);
                        ctx.quadraticCurveTo(c*bCell + bCell - 2, r*bCell + bCell - 2, c*bCell + bCell - 2 - eR, r*bCell + bCell - 2);
                        ctx.lineTo(c*bCell + 2 + eR, r*bCell + bCell - 2);
                        ctx.quadraticCurveTo(c*bCell + 2, r*bCell + bCell - 2, c*bCell + 2, r*bCell + bCell - 2 - eR);
                        ctx.lineTo(c*bCell + 2, r*bCell + 2 + eR);
                        ctx.quadraticCurveTo(c*bCell + 2, r*bCell + 2, c*bCell + 2 + eR, r*bCell + 2);
                        ctx.closePath();
                        ctx.fill();
                    }
                    }
                }

                // 消除动画：先放大再缩小（终极增强版）
                s.clearingCells.forEach(cell => {
                    ctx.save();
                    // 外发光（更亮更大）
                    ctx.shadowColor = cell.color || '#ffffff';
                    ctx.shadowBlur = 40 * Math.min(cell.scale * 1.5, 1.2);
                    ctx.globalAlpha = Math.min(cell.scale * 1.2, 1);
                    this.drawTexturedCandyCell(ctx, cell.c * bCell, cell.r * bCell, bCell, cell.color, 
                        Math.min(cell.scale * 1.4, 1.25), Math.min(cell.scale * 1.4, 1.25));
                    ctx.restore();
                });

                if (s.selectedPiece && !s.isGameOver) {
                    const { gridX, gridY } = GameApp.Core.getSnapCoordinates();
                    if (GameApp.Core.canPlaceShape(s.selectedPiece.shape, gridY, gridX)) {
                        ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; 
                        s.selectedPiece.shape.forEach((row, rIdx) => {
                            row.forEach((val, cIdx) => { if(val) ctx.fillRect((gridX+cIdx)*bCell+2, (gridY+rIdx)*bCell+2, bCell-4, bCell-4); });
                        });
                    }
                }

                // 绘製分數飛字（放大+发光）
                for (let fi = s.scoreFlyouts.length - 1; fi >= 0; fi--) {
                    const fl = s.scoreFlyouts[fi];
                    fl.y -= fl.vy; fl.timer -= 0.02;
                    if (fl.timer <= 0) { s.scoreFlyouts.splice(fi, 1); continue; }
                    ctx.save();
                    ctx.globalAlpha = Math.min(fl.timer * 2, 1);
                    // 分数越大字号越大
                    const scoreNum = parseInt(fl.text.replace(/\D/g,'')) || 0;
                    const fontSize = scoreNum > 500 ? 48 : scoreNum > 200 ? 38 : scoreNum > 80 ? 32 : 28;
                    ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    // 外发光（分层）- 增强版
                    ctx.shadowColor = fl.color || '#ffd700';
                    ctx.shadowBlur = 50;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(fl.text, fl.x + 2, fl.y + 2);
                    ctx.shadowBlur = 35;
                    ctx.fillStyle = fl.color || '#ffd700';
                    ctx.fillText(fl.text, fl.x, fl.y);
                    // 第二层超大光晕
                    ctx.shadowColor = fl.color || '#ffd700';
                    ctx.shadowBlur = 80;
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(fl.text, fl.x, fl.y);
                    ctx.restore();
                }


                // 粒子上限 200 个，防止爆内存
                while (s.particles.length > 300) s.particles.shift();
                s.particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); });
                
                if (s.allClearFlashTimer > 0) {
                    ctx.save();
                    ctx.globalAlpha = s.allClearFlashTimer * 0.6;
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    // 全屏光晕
                    const grd = ctx.createRadialGradient(220, 220, 0, 220, 220, 300);
                    grd.addColorStop(0, 'rgba(255,255,255,0.4)');
                    grd.addColorStop(0.5, 'rgba(255,255,255,0.1)');
                    grd.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = grd;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();
                }

                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, canvas.width, canvas.width, canvas.height - canvas.width);
                // 成就横幅渲染（Canvas内）
                if (s.lastAchievement && s.lastAchievement.timer > 0) {
                    s.lastAchievement.timer -= 0.03;
                    if (s.lastAchievement.timer <= 0) s.lastAchievement = null;
                    else {
                        ctx.save();
                        ctx.globalAlpha = Math.min(s.lastAchievement.timer * 2, 0.9);
                        ctx.fillStyle = s.lastAchievement.color;
                        ctx.shadowColor = s.lastAchievement.color;
                        ctx.shadowBlur = 40;
                        ctx.font = 'bold 22px -apple-system, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'top';
                        ctx.fillText(s.lastAchievement.icon + ' ' + s.lastAchievement.title, canvas.width/2, 8);
                        ctx.restore();
                    }
                }
                s.hand.forEach(piece => { if (!piece.isUsed && piece !== s.selectedPiece) this.drawPiece(piece, piece.x, piece.y, 24); });
                


                if (s.selectedPiece && !s.isGameOver) {
                    // 拖拽粒子轨迹（降频，每帧概率降低到10%）
                    if (Math.random() > 0.9) {
                        const tx = s.mouseX + (Math.random() - 0.5) * 25;
                        const ty = s.mouseY + (Math.random() - 0.5) * 25;
                        s.particles.push({ x: tx, y: ty, vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 3 - 1, radius: Math.random() * 3 + 1.5, alpha: 0.5, color: s.selectedPiece.color });
                    }
                    // 拖拽时加外发光，让方块更明显
                    const dx = s.mouseX - s.dragOffset.x;
                    const dy = s.mouseY - s.dragOffset.y - 50;
                    ctx.save();
                    ctx.shadowColor = s.selectedPiece.color;
                    ctx.shadowBlur = 25;
                    this.drawPiece(s.selectedPiece, dx, dy, bCell);
                    ctx.restore();
                    // 半透明底光
                    ctx.save();
                    ctx.shadowColor = 'rgba(255,255,255,0.5)';
                    ctx.shadowBlur = 40;
                    ctx.globalAlpha = 0.25;
                    this.drawPiece(s.selectedPiece, dx, dy, bCell);
                    ctx.restore();
                    // 实心绘制
                    this.drawPiece(s.selectedPiece, dx, dy, bCell);
                }
            }
        };
        window.onload = function() {
            GameApp.UI.init();
            GameApp.I18N.init();
            GameApp.Core.init();
            console.log("All You Can Put! Grand Master Edition Initialized.");
        };

    </script>
