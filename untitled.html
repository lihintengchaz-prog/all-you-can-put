<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALL YOU CAN PUT!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>">
    
    
    <style>
        /* ==========================================================================
           1. CORE CSS ARCHITECTURE (GLOBAL VARIABLES & THEME ENGINE)
           ========================================================================== */
        :root {
            /* 商業級高對比色彩庫 */
            --pink: #ff3377;
            --blue: #00e5ff;
            --yellow: #ffea00;
            --purple: #d500f9;
            --orange: #ff6d00;
            --green: #00ff66;
            --danger: #ff1744;
            
            /* 介面與陰影 */
            --panel-bg: rgba(22, 27, 49, 0.88);
            --modal-bg: #1c2136;
            --grid-dark: #121626;
            --grid-empty: #1d223a;
            
            /* 預設海洋主題漸變 */
            --bg-gradient: linear-gradient(135deg, #ff99ca 0%, #6fb9ff 40%, #2d4a7a 70%, #171b36 100%);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ==========================================================================
           2. UI LAYOUT & MENUS (LOBBY ARCHITECTURE)
           ========================================================================== */
        #menu-screen {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 30px 20px;
            z-index: 10;
            animation: appStartContainer 0.5s ease-out;
        }

        .lobby-header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 6px;
            padding: 6px;
        }

        .logo-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ffffff, var(--blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            filter: drop-shadow(3px 5px 12px rgba(0,0,0,0.4));
        }

        .lobby-settings-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
        }

        .lobby-settings-btn:hover {
            background: var(--blue);
            transform: translateY(-50%) scale(1.08) rotate(45deg);
            border-color: #fff;
            box-shadow: 0 0 15px var(--blue);
        }



        .mode-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 420px;
            margin: 0 auto;
        }
        /* 模式容器入场淡入 */
        .mode-container {
            animation: fadeInUp 0.8s ease-out both;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .mode-card {
            background: var(--panel-bg);
            border-radius: 22px;
            padding: 14px 22px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.08);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        /* 模式卡片光泽扫过 */
        .mode-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            animation: cardShine 4s ease-in-out infinite;
        }
        @keyframes cardShine {
            0%, 100% { left: -100%; }
            50% { left: 200%; }
        }

        .mode-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: var(--blue);
            box-shadow: 0 30px 60px rgba(0,242,254,0.2), 0 0 40px rgba(0,229,255,0.15);
        }

        .mode-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0;
            font-weight: 800;
            letter-spacing: 1px;
        }

        

        .play-btn {
            background: linear-gradient(45deg, var(--pink), var(--blue));
            color: #fff;
            border: none;
            padding: 10px 28px;
            font-weight: 800;
            border-radius: 14px;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 51, 119, 0.3);
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(0, 229, 255, 0.4);
        }

        .continue-btn {
            background: linear-gradient(45deg, var(--yellow), var(--orange));
            color: #000;
            margin: 0 auto 30px auto;
            display: none;
            font-weight: 900;
            letter-spacing: 1px;
            border: 2px solid #000;
            box-shadow: 0 10px 25px rgba(255, 234, 0, 0.4);
            animation: pulseGlowAnimation 1.6s infinite alternate;
        }

        /* 66關選擇面板樣式 */
        #level-select-panel {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 25px;
            width: 100%;
            max-height: 180px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #level-select-panel::-webkit-scrollbar {
            width: 6px;
        }

        #level-select-panel::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 3px;
        }

        .lvl-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .lvl-btn:hover {
            background: var(--pink);
            border-color: #fff;
            transform: scale(1.08);
            box-shadow: 0 0 12px var(--pink);
        }

        /* ==========================================
           3. GAME INTERFACE & CANVARENA LAYOUT
           ========================================== */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 850px;
            gap: 30px;
            padding: 15px;
            box-sizing: border-box;
            justify-content: center;
            align-items: flex-start;
        }

        .main-game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 460px;
        }

        .score-board-top {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 4px;
            box-sizing: border-box;
        }

        .left-nav-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .home-icon-btn, .settings-gear-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 1.2rem;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .home-icon-btn:hover { background: var(--pink); transform: scale(1.06); border-color: #fff; }
        .settings-gear-btn { margin-right: 6px; margin-top: 4px; }
        .settings-gear-btn:hover { background: var(--blue); transform: scale(1.06) rotate(45deg); border-color: #fff; }

        .score-left-box {
            display: flex;
            flex-direction: column;
        }

        .top-score-text {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-shadow: 2px 3px 6px rgba(0,0,0,0.3);
        }

        .top-best-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a223d;
            margin-top: 2px;
        }

        .status-indicators-bar {
            width: 100%;
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .indicator-tag {
            flex: 1;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.95rem;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        #lucky-progress-bar { display: none; color: var(--yellow); border-color: rgba(255, 234, 0, 0.25); }
        #clear-multiplier-tag { color: var(--green); border-color: rgba(0, 255, 102, 0.25); }

        .arena {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 18px;
            border-radius: 36px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.6s ease, box-shadow 0.6s ease;
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 24px;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            max-width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            background: var(--grid-dark);
            z-index: 1;
        }

        /* ==========================================
           4. 🔮 RIGHT SELECT PANEL (PIXEL PERFECT ADAPTATION)
           ========================================== */
        #custom-select-panel {
            display: none;
            flex-direction: column;
            background: var(--panel-bg);
            border-radius: 28px;
            padding: 18px;
            border: 2px solid var(--purple);
            max-height: 700px;
            overflow-y: auto;
            width: 240px;
            box-sizing: border-box;
            gap: 15px;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            align-items: center;
            animation: panelSlideIn 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #custom-select-panel::-webkit-scrollbar { width: 5px; }
        #custom-select-panel::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

        .select-item-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .select-item-card {
            background: #111422;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            width: 170px;
            height: 140px;
            transition: all 0.2s ease;
        }

        .select-item-card:hover {
            border-color: var(--purple);
            background: rgba(213, 0, 249, 0.12);
            transform: scale(1.04);
        }

        .select-item-name {
            font-size: 0.8rem;
            font-weight: 800;
            color: #9aa7c4;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ==========================================
           5. PREMIUM OVERLAY MODALS (ANTI-PENETRATION & HIGH Z-INDEX)
           ========================================== */
        .overlay-window {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 7, 15, 0.88);
            z-index: 999999; /* 絕對死鎖超高層級，防止事件穿透 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            background: #1c2136;
            padding: 35px 40px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 25px 55px rgba(0,0,0,0.6);
            max-width: 350px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            animation: modalPopIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-box h2 {
            margin-bottom: 18px;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .modal-box p {
            margin-bottom: 25px;
            font-size: 1.15rem;
            color: #a2aed4;
            font-weight: bold;
            line-height: 1.5;
        }

        .modal-btns {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-btn {
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .btn-retry { background: linear-gradient(45deg, var(--pink), var(--blue)); color: #fff; box-shadow: 0 6px 15px rgba(255,51,119,0.3); }
        .btn-menu { background: #2d3554; color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .btn-close { background: #475070; color: #fff; }
        
        .btn-retry:hover { box-shadow: 0 10px 20px rgba(0,229,255,0.4); }
        .btn-menu:hover { background: #384268; }

        /* 語言切換盒子 */
        .lang-toggle-box {
            margin: 5px 0 25px 0;
            background: rgba(0,0,0,0.2);
            padding: 14px 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .lang-label { font-size: 1rem; font-weight: 700; color: #a4b3dc; }
        .lang-btn-group { display: flex; gap: 10px; }
        
        .lang-sub-btn {
            background: #2a314e;
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .lang-sub-btn.active {
            background: var(--blue);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(0,229,255,0.5);
        }

        /* 幸運寶箱抖動動畫 */
        .chest-anim {
            font-size: 6rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: chestWobbleLoop 0.4s ease infinite alternate;
            cursor: pointer;
            filter: drop-shadow(0 8px 25px rgba(255,234,0,0.4));
            transition: transform 0.2s;
        }

        .chest-anim:hover {
            transform: scale(1.15);
        }

        /* ==========================================================================
           6. ADVANCED KEYFRAMES & ANIMATIONS
           ========================================================================== */
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.96); } 
            to { opacity: 1; transform: scale(1); } 
        }
        @keyframes appStartContainer { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes panelSlideIn { 
            from { opacity: 0; transform: translateX(40px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
        @keyframes modalPopIn { 
            from { opacity: 0; transform: scale(0.85) translateY(40px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
        @keyframes chestWobbleLoop { 
            from { transform: rotate(-8deg); } 
            to { transform: rotate(8deg); } 
        }
        @keyframes pulseGlowAnimation { 
            from { box-shadow: 0 0 10px var(--yellow); } 
            to { box-shadow: 0 0 35px var(--orange); transform: scale(1.03); } 
        }
        /* ==========================================================================
           3. SATISFYING FEEDBACK SYSTEM (震屏 / Combo / 飛字)
           ========================================================================== */
        @keyframes shakeGame {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5px, 3px); }
            20% { transform: translate(4px, -4px); }
            30% { transform: translate(-3px, 4px); }
            40% { transform: translate(3px, -2px); }
            50% { transform: translate(-2px, 3px); }
            60% { transform: translate(1px, -1px); }
            70% { transform: translate(-1px, 2px); }
            80% { transform: translate(0, -1px); }
            100% { transform: translate(0, 0); }
        }
        .screen-shake { animation: shakeGame 0.35s ease-out; }
        .screen-shake-heavy { animation: shakeGame 0.6s ease-out; }
        #combo-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
            display: flex; justify-content: center; align-items: center;
        }
        .combo-popup {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900; text-align: center;
            text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 4px 15px rgba(0,0,0,0.5);
            opacity: 0; transform: scale(0.3);
            animation: comboAppear 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .combo-popup-single {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900; text-align: center;
            text-shadow: 0 0 30px rgba(255,255,255,0.6), 0 4px 15px rgba(0,0,0,0.5);
            opacity: 0; transform: scale(0.3);
            animation: comboAppearSingle 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes comboAppear {
            0% { opacity: 0; transform: scale(0.3) rotate(-5deg); }
            20% { opacity: 1; transform: scale(1.3) rotate(3deg); }
            40% { opacity: 1; transform: scale(1.05) rotate(0deg); }
            70% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.8) translateY(-80px); }
        }
        @keyframes comboAppearSingle {
            0% { opacity: 0; transform: scale(0.3) rotate(-3deg); }
            25% { opacity: 1; transform: scale(1.15) rotate(2deg); }
            50% { opacity: 1; transform: scale(1) rotate(0deg); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .combo-label { font-size: clamp(1rem, 3vw, 1.8rem); font-weight: 700; letter-spacing: 4px; opacity: 0.9; margin-top: -10px; }
        .combo-color-gold { color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.9), 0 0 80px rgba(255,215,0,0.5); }
        .combo-color-pink { color: #ff3377; text-shadow: 0 0 40px rgba(255,51,119,0.9), 0 0 80px rgba(255,51,119,0.5); }
        .combo-color-cyan { color: #00e5ff; text-shadow: 0 0 40px rgba(0,229,255,0.9), 0 0 80px rgba(0,229,255,0.5); }
        .combo-color-white { color: #ffffff; text-shadow: 0 0 40px rgba(255,255,255,0.9), 0 0 80px rgba(255,255,255,0.5); }
        /* 奖励展示动画 */
        @keyframes prizePopIn {
            0% { opacity: 0; transform: scale(0.1) rotate(-20deg); filter: blur(10px); }
            30% { opacity: 1; transform: scale(1.5) rotate(5deg); filter: blur(0); }
            50% { transform: scale(0.95) rotate(-2deg); }
            70% { transform: scale(1.08) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
        @keyframes prizeIconBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.1); }
        }
        .score-flyout {
            position: absolute; pointer-events: none;
            font-weight: 900; font-size: 1.4rem;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255,215,0,0.8), 0 2px 8px rgba(0,0,0,0.5);
            z-index: 60;
            animation: flyUp 1s ease-out forwards;
        }
        .score-flyout-green { color: #00ff66; text-shadow: 0 0 15px rgba(0,255,102,0.8); }
        .score-flyout-purple { color: #d500f9; text-shadow: 0 0 15px rgba(213,0,249,0.8); }
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            25% { opacity: 1; transform: translateY(-20px) scale(1.4); }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }
        .sound-toggle-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 1.1rem;
            padding: 8px 16px; border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease;
            backdrop-filter: blur(5px); margin-top: 10px;
        }
        .sound-toggle-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        /* ==========================================================================
           4. WORLD-CLASS ANIMATIONS ENGINE (极致动效引擎)
           ========================================================================== */
           
        /* 标题呼吸流光 */
        @keyframes logoRainbow {
            0% { text-shadow: 0 0 20px #ff3377, 0 0 40px #ff3377; }
            20% { text-shadow: 0 0 20px #ffea00, 0 0 40px #ffea00; }
            40% { text-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff; }
            60% { text-shadow: 0 0 20px #00ff66, 0 0 40px #00ff66; }
            80% { text-shadow: 0 0 20px #d500f9, 0 0 40px #d500f9; }
            100% { text-shadow: 0 0 20px #ff3377, 0 0 40px #ff3377; }
        }
        .logo-title {
            animation: logoRainbow 3s ease-in-out infinite, logoFloat 2s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* 模式卡片入场：依次弹出 */
        .mode-card {
            animation: cardEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .mode-card:nth-child(1) { animation-delay: 0.1s; }
        .mode-card:nth-child(2) { animation-delay: 0.25s; }
        .mode-card:nth-child(3) { animation-delay: 0.4s; }
        .mode-card:nth-child(4) { animation-delay: 0.55s; }
        .mode-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.3);
        }
        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 按钮按下弹跳 */
        .play-btn, .modal-btn {
            transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.12s ease;
        }
        .play-btn:active, .modal-btn:active {
            transform: scale(0.92);
        }

        /* Combo爆炸级特效 */
        .combo-popup {
            text-shadow: 0 0 60px rgba(255,215,0,0.9), 0 0 120px rgba(255,215,0,0.6), 0 0 200px rgba(255,215,0,0.3);
        }
        @keyframes comboAppear {
            0% { opacity: 0; transform: scale(0.05) rotate(-15deg); filter: blur(12px); }
            10% { opacity: 1; transform: scale(1.8) rotate(8deg); filter: blur(0); }
            20% { opacity: 1; transform: scale(0.9) rotate(-4deg); }
            35% { opacity: 1; transform: scale(1.15) rotate(2deg); }
            50% { opacity: 1; transform: scale(1) rotate(0); }
            70% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(1.2) translateY(-150px) rotate(5deg); filter: blur(3px); }
        }
        .combo-label {
            font-size: clamp(1rem, 3vw, 1.8rem); font-weight: 700; letter-spacing: 4px;
            opacity: 0.9; margin-top: -10px;
        }
        
        /* 分数飞字终极炫酷 */
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0) scale(0.2) rotate(-8deg); filter: blur(5px); }
            12% { opacity: 1; transform: translateY(-15px) scale(1.8) rotate(5deg); filter: blur(0); }
            25% { opacity: 1; transform: translateY(-30px) scale(1.15) rotate(-2deg); }
            50% { opacity: 1; transform: translateY(-60px) scale(1); }
            75% { opacity: 1; transform: translateY(-80px) scale(0.9); }
            100% { opacity: 0; transform: translateY(-150px) scale(1.1) rotate(3deg); filter: blur(2px); }
        }

        /* 震屏加强 */
        @keyframes shakeGame {
            0% { transform: translate(0, 0); }
            5% { transform: translate(-12px, 8px) rotate(-1deg); }
            10% { transform: translate(10px, -10px) rotate(1deg); }
            15% { transform: translate(-9px, 9px) rotate(-0.5deg); }
            20% { transform: translate(8px, -6px) rotate(0.5deg); }
            30% { transform: translate(-6px, 6px); }
            40% { transform: translate(5px, -3px); }
            55% { transform: translate(-3px, 4px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(0, 0); }
        }
        .screen-shake { animation: shakeGame 0.5s ease-out; }
        .screen-shake-heavy { animation: shakeGame 0.8s ease-out; }

        /* Game Over/胜利 弹窗 + 背景闪烁 */
        @keyframes gameOverBgPulse {
            0%, 100% { background: rgba(0,0,0,0.6); }
            50% { background: rgba(0,0,0,0.8); }
        }
        .game-over-modal {
            animation: gameOverBgPulse 1.5s ease-in-out infinite;
        }

        /* 宝箱狂野抖动 */
        @keyframes chestWobbleLoop {
            0% { transform: rotate(-12deg) scale(1); }
            25% { transform: rotate(8deg) scale(1.05); }
            50% { transform: rotate(-6deg) scale(1.1); }
            75% { transform: rotate(10deg) scale(1.05); }
            100% { transform: rotate(-12deg) scale(1); }
        }
        .chest-anim {
            animation: chestWobbleLoop 0.35s ease infinite alternate;
        }
        .chest-anim:hover {
            animation: chestWobbleLoop 0.15s ease infinite alternate;
        }

        /* ==========================================================================
           5. AMBIENT BACKGROUND EFFECTS (环境动效装饰)
           ========================================================================== */
        .bg-decoration {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* 波浪 */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 60px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50% 50% 0 0;
            animation: waveMove 6s ease-in-out infinite;
        }
        .wave-1 { bottom: -10px; animation-duration: 5s; opacity: 0.4; }
        .wave-2 { bottom: 10px; animation-duration: 7s; opacity: 0.25; background: rgba(0, 229, 255, 0.04); }
        .wave-3 { bottom: -5px; animation-duration: 9s; opacity: 0.15; background: rgba(255, 51, 119, 0.04); }

        @keyframes waveMove {
            0% { transform: translateX(0) scaleY(1); }
            25% { transform: translateX(-5%) scaleY(1.2); }
            50% { transform: translateX(-10%) scaleY(0.8); }
            75% { transform: translateX(-5%) scaleY(1.1); }
            100% { transform: translateX(0) scaleY(1); }
        }

        /* 浮动粒子（动态发光版本） */
        .particle {
            position: absolute;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.12);
            animation: particleFloat 15s ease-in-out infinite;
            text-shadow: 0 0 10px currentColor;
        }
        .p1 { top: 15%; left: 10%; animation-delay: 0s; font-size: 1.4rem; color: rgba(0, 229, 255, 0.2); }
        .p2 { top: 25%; right: 15%; animation-delay: 2.5s; font-size: 1rem; color: rgba(255, 51, 119, 0.2); }
        .p3 { top: 60%; left: 5%; animation-delay: 5s; font-size: 1.6rem; color: rgba(255, 234, 0, 0.15); }
        .p4 { top: 50%; right: 8%; animation-delay: 1.5s; font-size: 1.1rem; color: rgba(0, 255, 102, 0.2); }
        .p5 { top: 80%; left: 20%; animation-delay: 3.5s; font-size: 1.3rem; color: rgba(213, 0, 249, 0.2); }
        .p6 { top: 10%; right: 25%; animation-delay: 6s; font-size: 0.9rem; color: rgba(0, 229, 255, 0.15); }
        .p7 { top: 70%; left: 80%; animation-delay: 2s; font-size: 1.5rem; color: rgba(255, 234, 0, 0.2); }
        .p8 { top: 40%; right: 5%; animation-delay: 4s; font-size: 1.2rem; color: rgba(255, 51, 119, 0.15); }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.1; }
            20% { transform: translateY(-20px) translateX(10px) rotate(30deg); opacity: 0.3; }
            40% { transform: translateY(-45px) translateX(-5px) rotate(60deg); opacity: 0.15; }
            60% { transform: translateY(-25px) translateX(15px) rotate(90deg); opacity: 0.25; }
            80% { transform: translateY(-50px) translateX(-10px) rotate(120deg); opacity: 0.1; }
        }

        /* 主内容在装饰之上 */
        #menu-screen, #game-screen { position: relative; z-index: 10; }

    </style>
</head>

        // ----------------------------------------------------------------------

        // MODULE: VIBE — 進階震動反饋 (Haptics Engine)
        // ----------------------------------------------------------------------
        GameApp.Vibe = {
            // 硬件震动 + 音频触感双引擎
            _hw: !!(navigator.vibrate || navigator.webkitVibrate),
            _lastTs: 0,
            _throttle: 25,
            // 兼容检测
            _vibrate: function(pattern) {
                const p = Array.isArray(pattern) ? pattern : [pattern];
                try {
                    if (navigator.vibrate) navigator.vibrate(p);
                    else if (navigator.webkitVibrate) navigator.webkitVibrate(p);
                } catch(e) {}
            },
            // 音频触感：对于不支持硬件震动的设备，用低音脉冲模拟
            _audioThump: function(intensity) {
                try {
                    GameApp.Audio._ensure();
                    const ctx = GameApp.Audio.ctx;
                    if (!ctx) return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(80 - intensity * 20, ctx.currentTime);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.08 + intensity * 0.06, ctx.currentTime + 0.005);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04 + intensity * 0.03);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.05 + intensity * 0.03);
                } catch(e) {}
            },
            // 节流调用
            _fire: function(pattern, intensity) {
                const now = Date.now();
                if (now - this._lastTs < this._throttle) return;
                this._lastTs = now;
                this._vibrate(pattern);
                this._audioThump(intensity || 0);
            },

            light: function() {
                // 纯硬件震动，不产生音频触感（防止拖拽时无限创建振荡器导致卡死）
                const now = Date.now();
                if (now - this._lastTs < this._throttle) return;
                this._lastTs = now;
                this._vibrate(12);
            },
            medium: function() {
                this._fire(25, 0.5);
            },
            heavy: function() {
                this._fire(45, 1);
            },
            celebration: function() {
                this._fire([55, 45, 55, 45, 90, 70, 120], 1);
                this._lastTs = 0;
            },
            triple: function() {
                this._fire([25, 18, 25, 18, 35], 0.7);
            },
            combo: function(count) {
                if (count <= 0) return;
                const pattern = [];
                for (let i = 0; i < Math.min(count, 4); i++) {
                    pattern.push(25, 18);
                }
                pattern.push(60);
                this._fire(pattern, 0.8);
                this._lastTs = 0;
            }
        };


        // MODULE: USER INTERFACE (UI) & MODALS
        // ----------------------------------------------------------------------
        // ----------------------------------------------------------------------
        // MODULE: AUDIO — Web Audio API 合成音效 (無需音頻文件)
        // ----------------------------------------------------------------------
                GameApp.Audio = {
            ctx: null,
            enabled: true,
            masterVolume: 0.38,

            _ensure: function() {
                if (this.ctx) return true;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    return true;
                } catch(e) { return false; }
            },

            toggle: function() {
                this.enabled = !this.enabled;
                const btn = document.getElementById('soundToggleBtn');
                if (btn) btn.innerText = this.enabled ? '🔊 音效 ON' : '🔇 音效 OFF';
                if (this.enabled) { this._ensure(); this.ctx && this.ctx.resume(); }
            },

            // 常用合成分数比：五度3:2, 大三度5:4, 小三度6:5, 纯四度4:3
            _playTone: function(freq, duration, type, vol, pitchEnd, wobble) {
                if (!this.enabled || !this._ensure()) return;
                var ctx = this.ctx, now = ctx.currentTime, v = (vol || 0.3) * this.masterVolume;
                // 主音
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.type = type || 'triangle';
                osc.frequency.setValueAtTime(freq, now);
                if (pitchEnd) osc.frequency.linearRampToValueAtTime(pitchEnd, now + duration * 0.6);
                if (wobble) {
                    var lfo = ctx.createOscillator();
                    var lfoGain = ctx.createGain();
                    lfo.frequency.value = wobble;
                    lfoGain.gain.value = freq * 0.003;
                    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
                    lfo.start(now); lfo.stop(now + duration);
                }
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(v, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(now); osc.stop(now + duration);

                // 泛音层（+12半音=八度）+7半音=五度
                var osc2 = ctx.createOscillator();
                var gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(freq * 1.5, now);
                gain2.gain.setValueAtTime(0, now);
                gain2.gain.linearRampToValueAtTime(v * 0.15, now + 0.015);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.5);
                osc2.connect(gain2); gain2.connect(ctx.destination);
                osc2.start(now); osc2.stop(now + duration * 0.6);
            },

            // 噪声纹理层（模拟物理摩擦、滑动等质感）
            _noise: function(duration, vol, highpass) {
                if (!this.enabled || !this._ensure()) return;
                var ctx = this.ctx, now = ctx.currentTime, bufSize = ctx.sampleRate * duration;
                if (bufSize <= 0) return;
                var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
                var src = ctx.createBufferSource();
                src.buffer = buf;
                var gain = ctx.createGain();
                gain.gain.setValueAtTime((vol || 0.1) * this.masterVolume, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                if (highpass) {
                    var hp = ctx.createBiquadFilter();
                    hp.type = 'highpass'; hp.frequency.value = highpass;
                    src.connect(hp); hp.connect(gain); gain.connect(ctx.destination);
                } else { src.connect(gain); gain.connect(ctx.destination); }
                src.start(now); src.stop(now + duration);
            },

            // 闪音（用于消行瞬间）
            _sparkle: function(freq, duration, vol) {
                this._playTone(freq, duration, 'sine', vol, freq * 1.02, 0);
                setTimeout(() => {
                    this._playTone(freq * 1.25, duration * 0.6, 'sine', vol * 0.5, 0, 0);
                }, duration * 300);
            },

            // ============================================================
            // 🎯 方块放置音：柔和的布料落地感 + 低频共鸣
            // ============================================================
            place: function() {
                // 主音：温暖的落点
                this._playTone(280, 0.1, 'triangle', 0.2);
                // 低频共鸣：模拟方块落下的物理感
                this._playTone(110, 0.18, 'sine', 0.08, 90);
                // 微噪：模拟摩擦的沙沙感
                this._noise(0.04, 0.06, 2000);
            },

            // ============================================================
            // 🎯 1行消除：清脆叮咚 ~ 像玻璃杯轻碰
            // ============================================================
            lineClear: function() {
                this._sparkle(880, 0.25, 0.25);
                setTimeout(() => this._sparkle(1100, 0.2, 0.15), 50);
                // 泛音回荡
                setTimeout(() => this._playTone(660, 0.4, 'sine', 0.06, 0, 3), 120);
            },

            // ============================================================
            // 🎯 2行消除：双音上行 + 更丰富的回响
            // ============================================================
            doubleClear: function() {
                this._playTone(660, 0.15, 'triangle', 0.25);
                setTimeout(() => this._playTone(880, 0.15, 'triangle', 0.22), 60);
                setTimeout(() => this._playTone(1100, 0.2, 'sine', 0.18), 120);
                setTimeout(() => this._playTone(880, 0.5, 'sine', 0.06, 0, 4), 200);
                this._noise(0.05, 0.04, 3000);
            },

            // ============================================================
            // 🎯 3行消除：喜洋洋的三音上行和弦
            // ============================================================
            tripleClear: function() {

            megaClear: function() {

            multiClear: function(lines) {

            _lastDisplayedScore: 0,

            updateScoreDisplay: function() {
                const t = GameApp.I18N;
                const s = GameApp.State;
                
                // 分数滚动效果 + 弹动动画
                if (this._lastDisplayedScore !== s.bScore) {
                    const el = this.elements.topScoreText;
                    const startVal = this._lastDisplayedScore;
                    const endVal = s.bScore;
                    const duration = Math.min(600, Math.max(200, Math.abs(endVal - startVal) * 2));
                    const startTime = Date.now();
                    // 加分时闪一下
                    el.style.transition = 'transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    el.style.transform = 'scale(1.2)';
                    setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
                    const animate = () => {
                        const elapsed = Date.now() - startTime;
                        const progress = Math.min(1, elapsed / duration);
                        // ease-out quad
                        const eased = progress * (2 - progress);
                        const current = Math.round(startVal + (endVal - startVal) * eased);
                        el.innerText = `${t.getText('score')}: ${current}`;
                        if (progress < 1) requestAnimationFrame(animate);
                    };
                    animate();
                    this._lastDisplayedScore = s.bScore;
                } else {
                    this.elements.topScoreText.innerText = `${t.getText('score')}: ${s.bScore}`;
                }
                if (s.currentMode === 'level') { 
                    this.elements.topScoreText.innerText = `${t.getText('stage')} ${s.currentLevel}: ${s.bScore} / ${s.targetScore}`; 
                }
                if (s.currentMode === 'lucky') { 
                    this.elements.luckyMultiplierTag.innerText = `${t.getText('multiplier')}: ${s.currentMultiplier.toFixed(1)}x`;
                this.elements.luckyProgressBar.innerText = `${t.getText('luckyProgress')}: ${s.luckyLinesNeeded} ${t.getText('rows')}`; 
                }
                

                this.elements.topBestText.innerText = `${t.getText('best')}: ${s.bBestScore}`;
            },

            generateLevelConfig: function(lvl) {
                let target = 150 + (lvl * 15); let obstacles = [];
